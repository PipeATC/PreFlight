const SETTINGS_KEY = "flightChecklistSettings";
const DEFAULT_SETTINGS = {whiteMode:true,milGreen:false,autoAdvance:true,floatDone:true,lang:"en"};

function normalizeLang(lang){
  if(lang==="fr") return "es";
  return lang==="es" ? "es" : "en";
}

function uiLang(settings){ return normalizeLang(settings?.lang); }
function uiT(settings){ return T[uiLang(settings)] || T.en; }
function checklistFor(ac, settings){
  return ac.checklists[uiLang(settings)] || ac.checklists.en;
}

function loadSettings(){
  try{
    const raw = localStorage.getItem(SETTINGS_KEY);
    if(!raw) return {...DEFAULT_SETTINGS};
    const saved = JSON.parse(raw);
    return {...DEFAULT_SETTINGS,...saved,lang:normalizeLang(saved.lang)};
  }catch{
    return {...DEFAULT_SETTINGS};
  }
}

// ── SETTINGS PANEL ─────────────────────────────────────────────────────────
function SettingsPanel({onClose,settings,setSettings}){
  const lang = uiLang(settings);
  const t = uiT(settings);
  const bg = settings.milGreen ? "#1a2210" : settings.whiteMode ? "#fff" : "#0d1624";
  const border = settings.milGreen ? "#3a5020" : settings.whiteMode ? "#d0dde8" : "#1e2a3a";
  const text = settings.milGreen ? "#b8c9a0" : settings.whiteMode ? "#1a2535" : "#c8d6e5";
  const accent = settings.milGreen ? "#8fbc5a" : "#4FC3F7";

  const toggle = (k) => setSettings(s=>({...s,[k]:!s[k]}));
  const setLang = (l) => setSettings(s=>({...s,lang:normalizeLang(l)}));

  return (
    <div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}
         onClick={onClose}>
      <div className="slide-up" onClick={e=>e.stopPropagation()}
           style={{background:bg,borderTop:`2px solid ${accent}`,padding:"20px 20px 32px",
                   boxShadow:"0 -8px 32px #0006",maxHeight:"70vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:14,letterSpacing:4,color:accent,fontWeight:"bold"}}>{t.settingsTitle}</div>

// ── CUSTOM CHECKLIST BUILDER ───────────────────────────────────────────────
function CustomBuilder({onClose,editId,customLists,setCustomLists,settings}){
  const t = uiT(settings);
  const existing = editId ? customLists.find(c=>c.id===editId) : null;
  const [name,setName] = useState(existing?.name||"");
  const [phases,setPhases] = useState(existing?.phases||[{name:"CHECKLIST",items:[""]}]);
  const [activeP,setActiveP] = useState(0);

  const bg = settings.milGreen?"#0d1208":settings.whiteMode?"#f0f4f8":"#0a0e14";
  const border = settings.milGreen?"#3a5020":settings.whiteMode?"#d0dde8":"#1e2a3a";
  const text = settings.milGreen?"#b8c9a0":settings.whiteMode?"#1a2535":"#c8d6e5";
  const accent = settings.milGreen?"#8fbc5a":"#4FC3F7";
  const dim = settings.milGreen?"#5a7040":settings.whiteMode?"#8899aa":"#3a5070";

  const addPhase = ()=>{
    setPhases(ps=>[...ps,{name:"NEW PHASE",items:[""]}]);
    setActiveP(phases.length);
  };
  const removePhase = (i)=>{
    if(phases.length<=1)return;
    const np = phases.filter((_,idx)=>idx!==i);
    setPhases(np);
    setActiveP(Math.min(i,np.length-1));
  };
  const updatePhaseName = (i,v)=>setPhases(ps=>ps.map((p,idx)=>idx===i?{...p,name:v.toUpperCase()}:p));
  const updateItem = (pi,ii,v)=>setPhases(ps=>ps.map((p,idx)=>idx===pi?{...p,items:p.items.map((it,iix)=>iix===ii?v:it)}:p));
  const addItem = (pi)=>setPhases(ps=>ps.map((p,idx)=>idx===pi?{...p,items:[...p.items,""]}:p));
  const removeItem = (pi,ii)=>setPhases(ps=>ps.map((p,idx)=>idx===pi?{...p,items:p.items.filter((_,iix)=>iix!==ii)}:p));

  const save = ()=>{
    if(!name.trim())return;
    const entry = {id:editId||Date.now().toString(),name:name.trim(),phases,color:"#4FC3F7",icon:"✅"};
    if(editId){
      setCustomLists(ls=>ls.map(l=>l.id===editId?entry:l));
    } else {
      setCustomLists(ls=>[...ls,entry]);
    }
    onClose();
  };

  const p = phases[activeP]||phases[0];

  return (
    <div style={{position:"fixed",inset:0,zIndex:200,background:bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 14px 10px",borderBottom:`1px solid ${border}`,flexShrink:0}}>
        <button onClick={onClose} style={{background:"transparent",border:`1px solid ${border}`,color:dim,padding:"5px 10px",borderRadius:4,cursor:"pointer",fontSize:11,letterSpacing:1}}>{t.back}</button>
        <input value={name} onChange={e=>setName(e.target.value)}
               placeholder={t.checklistName}
               style={{flex:1,background:"transparent",border:`1px solid ${border}`,color:text,
                       padding:"6px 10px",borderRadius:4,fontSize:13,outline:"none",letterSpacing:1}}/>
        <button onClick={save} style={{background:accent+"22",border:`1px solid ${accent}`,color:accent,
                                        padding:"6px 12px",borderRadius:4,cursor:"pointer",fontSize:11,letterSpacing:1}}>{t.save}</button>
      </div>

      {/* Phase tabs */}
      <div style={{display:"flex",overflowX:"auto",gap:4,padding:"8px 14px",borderBottom:`1px solid ${border}`,flexShrink:0,
                   scrollbarWidth:"none"}}>
        {phases.map((ph,i)=>(
          <button key={i} onClick={()=>setActiveP(i)}
                  style={{flexShrink:0,padding:"4px 8px",background:i===activeP?accent+"18":"transparent",
                          border:`1px solid ${i===activeP?accent:border}`,color:i===activeP?accent:dim,
                          fontSize:8,letterSpacing:1,cursor:"pointer",borderRadius:3,whiteSpace:"nowrap",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis"}}>
            {ph.name||"PHASE"}
          </button>
        ))}
        <button onClick={addPhase} style={{flexShrink:0,padding:"4px 8px",background:"transparent",
                border:`1px dashed ${dim}`,color:dim,fontSize:8,letterSpacing:1,cursor:"pointer",borderRadius:3}}>
          +
        </button>
      </div>

      {/* Phase edit */}
      <div style={{flex:1,overflow:"auto",padding:"10px 14px"}}>
        {p && (
          <>
            <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
              <input value={p.name} onChange={e=>updatePhaseName(activeP,e.target.value)}
                     placeholder={t.phaseName}
                     style={{flex:1,background:"transparent",border:`1px solid ${border}`,color:accent,
                             padding:"5px 8px",borderRadius:3,fontSize:12,letterSpacing:1,outline:"none"}}/>
              {phases.length>1&&(
                <button onClick={()=>removePhase(activeP)}
                        style={{background:"transparent",border:`1px solid #FF174444`,color:"#FF1744",
                                padding:"4px 8px",borderRadius:3,cursor:"pointer",fontSize:10}}>✕</button>
              )}
            </div>
            {p.items.map((item,ii)=>(
              <div key={ii} style={{display:"flex",gap:6,marginBottom:6,alignItems:"center"}}>
                <div style={{width:16,height:16,border:`1px solid ${border}`,borderRadius:2,flexShrink:0}}/>
                <input value={item} onChange={e=>updateItem(activeP,ii,e.target.value)}
                       placeholder={t.itemText}
                       style={{flex:1,background:"transparent",border:`1px solid ${border}`,color:text,
                               padding:"5px 8px",borderRadius:3,fontSize:13,outline:"none"}}/>
                <button onClick={()=>removeItem(activeP,ii)}
                        style={{background:"transparent",border:"none",color:dim,cursor:"pointer",fontSize:13,padding:"0 4px"}}>✕</button>
              </div>
            ))}
            <button onClick={()=>addItem(activeP)}
                    style={{width:"100%",marginTop:4,padding:"6px 0",background:"transparent",
                            border:`1px dashed ${dim}`,color:dim,fontSize:10,cursor:"pointer",
                            borderRadius:3,letterSpacing:1}}>
              {t.addItem}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ── CHECKLIST SCREEN ───────────────────────────────────────────────────────
function ChecklistScreen({aircraftId,onBack,settings,customLists}){
  const t = uiT(settings);
  const isCustom = customLists.some(c=>c.id===aircraftId);
  const customEntry = isCustom ? customLists.find(c=>c.id===aircraftId) : null;

  const ac = isCustom ? null : AIRCRAFT[aircraftId];
  const allPhases = isCustom
    ? Object.fromEntries(customEntry.phases.map(p=>[p.name,p.items.filter(i=>i.trim())]))
    : checklistFor(ac, settings);

  const phases = Object.keys(allPhases);
  const [activePhase,setActivePhase] = useState(phases[0]);
  const [checked,setChecked] = useState({});
  const [completing,setCompleting] = useState({});
  const [showSpeeds,setShowSpeeds] = useState(false);
  const [showEmergencies, setShowEmergencies] = useState(false);
  const tabsRef = useRef(null);

  const color = isCustom ? "#4FC3F7" : ac.color;
  const name = isCustom ? customEntry.name : ac.name;
  const reg = isCustom ? "" : ac.registration;
  const emList = ac?.emergencies ? (ac.emergencies[uiLang(settings)] || ac.emergencies.en) : null;

  const bg = settings.milGreen?"#0d1208":settings.whiteMode?"#f0f4f8":"#0a0e14";
  const border = settings.milGreen?"#2a4018":settings.whiteMode?"#d0dde8":"#1e2a3a";
  const text = settings.milGreen?"#b8c9a0":settings.whiteMode?"#1a2535":"#c8d6e5";
  const textDim = settings.milGreen?"#5a7040":settings.whiteMode?"#8899aa":"#3a5070";
  const accentSys = settings.milGreen?"#8fbc5a":"#4FC3F7";

  const items = allPhases[activePhase]||[];
  const accent = isCustom ? accentSys : phaseColor(activePhase);

  const [confirmed,setConfirmed] = useState({});

  const toggle = (phase,idx)=>{
    const key = `${phase}-${idx}`;
    const item = (allPhases[phase]||[])[idx];
    if(item&&item.startsWith("⚠"))return;
    const now = !checked[key];
    if(now){
      setCompleting(c=>({...c,[key]:true}));
      setTimeout(()=>{
        setChecked(c=>({...c,[key]:true}));
        setConfirmed(c=>({...c,[key]:true}));
        setCompleting(c=>{const n={...c};delete n[key];return n;});
      },250);
      if(settings.autoAdvance){
        setTimeout(()=>{
          const its = allPhases[phase]||[];
          const allDoneNow = its.every((_,i)=>i===idx||checked[`${phase}-${i}`]||_?.startsWith("⚠"));
          if(allDoneNow){
            const next = phases[phases.indexOf(phase)+1];
            if(next)setTimeout(()=>setActivePhase(next),400);
          }
        },300);
      }
    } else {
      setChecked(c=>({...c,[key]:false}));
      setConfirmed(c=>{const n={...c};delete n[key];return n;});
    }
  };

  const resetPhase = ()=>{
    const keys = items.map((_,i)=>`${activePhase}-${i}`);
    setChecked(c=>{const n={...c};keys.forEach(k=>delete n[k]);return n;});
    setConfirmed(c=>{const n={...c};keys.forEach(k=>delete n[k]);return n;});
  };

  const doneCount = items.filter((_,i)=>checked[`${activePhase}-${i}`]).length;
  const warnCount = items.filter(it=>it.startsWith("⚠")).length;
  const checkableCount = items.length - warnCount;
  const allDone = checkableCount>0 && doneCount>=checkableCount;

  let displayItems = items.map((it,i)=>({it,i}));
  if(settings.floatDone){
    const undone = displayItems.filter(({it,i})=>!checked[`${activePhase}-${i}`]&&!it.startsWith("⚠"));
    const done = displayItems.filter(({it,i})=>checked[`${activePhase}-${i}`]);
    const warn = displayItems.filter(({it})=>it.startsWith("⚠"));
    displayItems = [...warn,...undone,...done];
  }

  const hasReset = doneCount>0 && activePhase!=="EMERGENCIES" && activePhase!=="URGENCES";

  return (
    <div style={{minHeight:"100vh",background:bg,display:"flex",flexDirection:"column"}}>
      {showSpeeds&&!isCustom&&ac.speedTable&&(
        <SpeedSheet speedTable={ac.speedTable} color={color} name={name} registration={reg}
                    onClose={()=>setShowSpeeds(false)} settings={settings}/>
      )}
      {showEmergencies&&!isCustom&&emList&&(
        <EmergencySheet emergencies={emList} color={color} name={name} registration={reg}
                        onClose={()=>setShowEmergencies(false)} settings={settings}/>
      )}

      {/* Header superior estructurado en Fila */}
      <div style={{padding:"16px 16px 10px",borderBottom:`1px solid ${border}`,flexShrink:0}}>
        
        {/* Fila Título y Back */}
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap:10, marginBottom:16}}>
          <button onClick={onBack} style={{background:"transparent",border:`1px solid ${border}`,color:textDim,
                                            padding:"8px 14px",borderRadius:5,cursor:"pointer",fontSize:13,fontWeight:"bold",letterSpacing:1}}>
            {t.back}
          </button>
          
          <div style={{flex:1, textAlign:"center"}}>
            <div style={{fontSize:10,letterSpacing:3,color,marginBottom:4}}>{isCustom?"CUSTOM":(ac.type.toUpperCase())}</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,flexWrap:"wrap"}}>
              <div style={{fontSize:16,fontWeight:"bold",letterSpacing:1,color:text}}>{name}</div>
              {reg&&<div style={{fontSize:11,padding:"3px 8px",background:`${color}22`,border:`1px solid ${color}44`,borderRadius:4,color,fontWeight:"bold",letterSpacing:1}}>{reg}</div>}
            </div>
          </div>
          
          <div style={{textAlign:"right",minWidth:50}}>
            <div style={{fontSize:10,color:textDim,letterSpacing:2,marginBottom:4}}>{t.phase}</div>
            <div style={{fontSize:14,fontWeight:"bold",color:allDone?"#4CAF50":accent}}>{allDone?t.done:`${doneCount}/${checkableCount}`}</div>
          </div>
        </div>

        {/* Fila de Botones (Speeds, Emergencies, Reset) distribuidos horizontalmente */}
        <div style={{display:"flex", gap:8, marginBottom:16}}>
          {!isCustom&&ac.speedTable&&(
            <button onClick={()=>setShowSpeeds(true)}
              style={{flex:1, background:`${color}18`,border:`1px solid ${color}66`,color:color,
                      fontSize:12,fontWeight:"bold",padding:"10px 0",borderRadius:6,cursor:"pointer",letterSpacing:1}}>
              ✈ SPEEDS
            </button>
          )}
          {!isCustom&&emList&&(
            <button onClick={()=>setShowEmergencies(true)}
              style={{flex:1, background:`#FF525218`,border:`1px solid #FF525266`,color:"#FF5252",
                      fontSize:12,fontWeight:"bold",padding:"10px 0",borderRadius:6,cursor:"pointer",letterSpacing:1}}>
              ⚠ EMERGENCIES
            </button>
          )}
          {hasReset&&(
            <button onClick={resetPhase}
              style={{flex:(!isCustom&&ac.speedTable)? 0.6 : 1, background:`${border}44`,border:`1px solid ${border}`,color:text,
                      fontSize:12,fontWeight:"bold",padding:"10px 0",borderRadius:6,cursor:"pointer",letterSpacing:1}}>
              ↺ RESET
            </button>
          )}
        </div>

        {/* Progress Bar */}
        <div style={{height:4,background:`${border}`,borderRadius:2,marginBottom:12,overflow:"hidden"}}>
          <div style={{height:"100%",background:allDone?"#4CAF50":accent,
                       width:`${checkableCount>0?(doneCount/checkableCount)*100:0}%`,
                       transition:"width 0.3s",boxShadow:allDone?"0 0 8px #4CAF50":undefined}}/>
        </div>

        {/* Phase tabs */}
        <div ref={tabsRef} style={{display:"flex",overflowX:"auto",gap:6,scrollbarWidth:"none",WebkitOverflowScrolling:"touch",paddingBottom:2}}>
          {phases.map(phase=>{
            const pColor = isCustom ? accentSys : phaseColor(phase);
            const isActive = phase===activePhase;
            const pItems = allPhases[phase]||[];
            const pWarn = pItems.filter(it=>it.startsWith("⚠")).length;
            const pDone = pItems.filter((_,i)=>checked[`${phase}-${i}`]).length;
            const pDoneAll = pItems.length-pWarn>0 && pDone>=(pItems.length-pWarn);
            return (
              <button key={phase} onClick={()=>setActivePhase(phase)}
                      style={{flexShrink:0,padding:"8px 14px",background:isActive?`${pColor}18`:`${border}33`,
                              border:`1px solid ${isActive?pColor:border}`,borderRadius:6,fontWeight:isActive?"bold":"normal",
                              color:isActive?pColor:textDim,fontSize:12,letterSpacing:0.5,cursor:"pointer",transition:"all 0.2s",
                              whiteSpace:"nowrap"}}>
                {pDoneAll?"✓ ":""}{phase}
              </button>
            );
          })}
        </div>
      </div>

      {/* Items */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 16px 24px"}}>
        <div style={{fontSize:14,fontWeight:"bold",letterSpacing:2,color:accent,marginBottom:16}}>{activePhase}</div>
        
        {displayItems.map(({it,i})=>{
          const key = `${activePhase}-${i}`;
          const done = !!checked[key];
          const isWarn = it.startsWith("⚠");
          const isCompleting = !!completing[key];
          const isConfirmed = !!confirmed[key];
          return (
            <div key={i} onClick={()=>toggle(activePhase,i)}
                 style={{display:"flex",alignItems:"flex-start",gap:12,padding:"14px 16px",
                         marginBottom:8,borderRadius:8,cursor:isWarn?"default":"pointer",
                         background:isConfirmed?"#00ff8808":isCompleting?`${accent}10`:isWarn?`${border}11`:`${border}22`,
                         border:`1px solid ${isConfirmed?"#4CAF5044":isWarn?"#FF174433":border}`,
                         transition:"all 0.2s ease-in-out"}}>
              {!isWarn&&(
                <div style={{width:24,height:24,border:`2px solid ${(done||isCompleting)?"#4CAF50":accent+"66"}`,borderRadius:6,
                             flexShrink:0,background:(done||isCompleting)?"#4CAF50":"transparent",
                             display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",marginTop:0}}>
                  {(done||isCompleting)&&<span style={{color:"#000",fontSize:14,fontWeight:"bold",lineHeight:1}}>✓</span>}
                </div>
              )}
              {!isWarn&&<span style={{fontSize:13,color:textDim,width:22,flexShrink:0,letterSpacing:1,paddingTop:2,fontWeight:"bold"}}>{String(i+1).padStart(2,"0")}</span>}
              <span style={{fontSize:isWarn?14:15,letterSpacing:0.2,fontWeight:isWarn?"bold":"normal",
                            color:isConfirmed?"#4CAF50":isWarn?"#FF5252":text,
                            textDecoration:isConfirmed?"line-through":"none",
                            transition:"all 0.2s",flex:1,lineHeight:1.5}}>
                {it}
              </span>
            </div>
          );
        })}
        {allDone&&(
          <div style={{marginTop:20,padding:"16px 20px",background:"#4CAF5014",border:"1px solid #4CAF5044",
                       borderRadius:8,textAlign:"center",color:"#4CAF50",fontSize:14,fontWeight:"bold",letterSpacing:2,animation:"fadeIn 0.4s ease"}}>
            ✓ {t.done}
          </div>
        )}
      </div>
    </div>
  );
}

// ── SELECTION SCREEN ───────────────────────────────────────────────────────

  const typeAircraft = Object.entries(AIRCRAFT).filter(([_,ac])=>ac.aircraftType===aircraftType);
  const meta = TYPE_META[aircraftType];

  const border = settings.milGreen?"#2a4018":settings.whiteMode?"#d0dde8":"#1e2a3a";
  const text = settings.milGreen?"#b8c9a0":settings.whiteMode?"#1a2535":"#c8d6e5";
  const textDim = settings.milGreen?"#5a7040":settings.whiteMode?"#8899aa":"#3a5070";

        <div style={{width:36,height:36,background:`${meta.color}18`,border:`1px solid ${meta.color}44`,

          {meta.icon}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,letterSpacing:3,color:accent,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{meta.label.toUpperCase()}</div>
        </div>
      </div>

      {/* Aircraft list */}
      {typeAircraft.map(([id,ac])=>{
        const isHov = hovered===id;

          <div key={id} onClick={()=>onSelect(id)}
               onMouseEnter={()=>setHovered(id)} onMouseLeave={()=>setHovered(null)}

              <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",marginBottom:4}}>

                <div style={{fontSize:11,padding:"3px 7px",background:`${ac.color}22`,border:`1px solid ${ac.color}44`,borderRadius:4,color:ac.color,fontWeight:"bold",letterSpacing:1}}>{ac.registration}</div>
              </div>

              {ac.version&&<div style={{fontSize:11,color:textDim,opacity:.7,marginTop:1}}>{ac.version}</div>}

      })}
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────
function App(){
  const [settings,setSettings] = useState(loadSettings);
  const [view,setView] = useState("home"); // home | type | checklist | custom
  const [showSettings,setShowSettings] = useState(false);
  const [selectedType,setSelectedType] = useState(null);
  const [selectedAc,setSelectedAc] = useState(null);
  const [customLists,setCustomLists] = useState([]);

  const updateSettings = (patch)=>{
    setSettings(prev=>{
      const next = typeof patch==="function" ? patch(prev) : {...prev,...patch};
      if(next.lang) next.lang = normalizeLang(next.lang);
      try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(next)); }catch{}
      return next;
    });
  };

  useEffect(()=>{
    document.body.className = settings.milGreen?"mil-green":settings.whiteMode?"white-mode":"";
  },[settings.milGreen,settings.whiteMode]);

  useEffect(()=>{
    if(!("serviceWorker" in navigator)) return;
    navigator.serviceWorker.getRegistrations().then(regs=>{
      regs.forEach(reg=>reg.update());
    });
  },[]);

  const goChecklist = (id)=>{ setSelectedAc(id); setView("checklist"); };
  const selectType = (typeId)=>{
    setSelectedType(typeId);
    setView("type");
  };

  return (
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh"}}>
      {view==="home" && (
        <HomeScreen
          settings={settings}
          onSelect={selectType}
          onCustom={()=>setView("custom")}
          onSettings={()=>setShowSettings(true)}
        />
      )}
      {view==="type" && (
        <SelectionScreen
          aircraftType={selectedType}
          settings={settings}
          onSelect={goChecklist}
          onBack={()=>setView("home")}
        />
      )}
      {view==="checklist" && (
        <ChecklistScreen
          aircraftId={selectedAc}
          settings={settings}
          customLists={customLists}
          onBack={()=>{
            const isCustom = customLists.some(c=>c.id===selectedAc);
            if(isCustom){ setView("custom"); return; }
            const ac = AIRCRAFT[selectedAc];
            const sameType = ac?.aircraftType
              ? Object.values(AIRCRAFT).filter(a=>a.aircraftType===ac.aircraftType)
              : [];
            if(sameType.length===1) setView("home");
            else { setSelectedType(ac.aircraftType); setView("type"); }
          }}
        />
      )}
      {view==="custom" && (
        <CustomScreen
          settings={settings}
          customLists={customLists}
          setCustomLists={setCustomLists}
          onBack={()=>setView("home")}
          onSelect={(id)=>{ setSelectedAc(id); setView("checklist"); }}
        />
      )}
      {showSettings && (
        <SettingsPanel onClose={()=>setShowSettings(false)} settings={settings} setSettings={updateSettings}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js?v=6')
      .then(function(reg){
        reg.update();
        console.log('SW registered:', reg.scope);
      })
      .catch(function(err){ console.log('SW failed:', err); });
  });
}
</script>
