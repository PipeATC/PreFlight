// Interpolate forward/aft CG limits at a given weight from envelope points.
function cgLimitsAt(weight, envelope){
  const pts=[...(envelope||[])].sort((a,b)=>a.w-b.w);
  if(!pts.length) return {fwd:0,aft:0};
  if(weight<=pts[0].w) return {fwd:pts[0].fwd,aft:pts[0].aft};
  if(weight>=pts[pts.length-1].w) return {fwd:pts[pts.length-1].fwd,aft:pts[pts.length-1].aft};
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i],b=pts[i+1];
    if(weight>=a.w&&weight<=b.w){
      const t=(weight-a.w)/(b.w-a.w);
      return {fwd:a.fwd+(b.fwd-a.fwd)*t, aft:a.aft+(b.aft-a.aft)*t};
    }
  }
  return {fwd:pts[0].fwd,aft:pts[0].aft};
}

function normalizeLang(lang){
  if(lang==="fr") return "es";
  return lang==="es" ? "es" : "en";
}

function uiLang(settings){ return normalizeLang(settings?.lang); }
function uiT(settings){ return T[uiLang(settings)] || T.en; }
function checklistFor(ac, settings){
  return ac.checklists[uiLang(settings)] || ac.checklists.en;
}

function loadSettings(){
  try{
    const raw = localStorage.getItem(SETTINGS_KEY);
    if(!raw) return {...DEFAULT_SETTINGS};
    const saved = JSON.parse(raw);
    return {...DEFAULT_SETTINGS,...saved,lang:normalizeLang(saved.lang)};
  }catch{
    return {...DEFAULT_SETTINGS};
  }
}

  const bg = settings.milGreen ? "#1a2210" : settings.whiteMode ? "#fff" : "#0d1624";
  const border = settings.milGreen ? "#3a5020" : settings.whiteMode ? "#d0dde8" : "#1e2a3a";
  const text = settings.milGreen ? "#b8c9a0" : settings.whiteMode ? "#1a2535" : "#c8d6e5";
  const accent = settings.milGreen ? "#8fbc5a" : "#4FC3F7";

  const toggle = (k) => setSettings(s=>({...s,[k]:!s[k]}));
  const setLang = (l) => setSettings(s=>({...s,lang:normalizeLang(l)}));
  const theme = settings.milGreen ? "mil" : settings.whiteMode ? "white" : "dark";
  const setTheme = (th) => setSettings(s=>({...s,whiteMode:th==="white",milGreen:th==="mil"}));
  const THEMES = [{id:"white",label:t.whiteMode},{id:"dark",label:t.darkMode},{id:"mil",label:t.milGreen}];

        </div>

        {/* Theme */}

          <div style={{fontSize:11,letterSpacing:3,color:accent,marginBottom:8}}>{t.theme.toUpperCase()}</div>
          <div style={{display:"flex",gap:8}}>
            {THEMES.map(th=>(
              <button key={th.id} onClick={()=>setTheme(th.id)}
                      style={{flex:1,padding:"10px 4px",background:theme===th.id?accent+"22":"transparent",
                              border:`1px solid ${theme===th.id?accent:border}`,
                              color:theme===th.id?accent:text,fontSize:12,cursor:"pointer",borderRadius:4,
                              letterSpacing:0.5,lineHeight:1.2}}>
                {th.label.toUpperCase()}
              </button>
            ))}

        </div>

        {/* Toggles */}
        {[
          {k:"autoAdvance",label:t.autoAdvance},
          {k:"floatDone",label:t.floatDone},
          {k:"centerText",label:t.centerText},
          {k:"largeText",label:t.largeText},
        ].map(({k,label})=>(
          <div key={k} onClick={()=>toggle(k)}
               style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                       padding:"13px 14px",marginBottom:8,cursor:"pointer",
                       background:settings[k]?accent+"14":"transparent",
                       border:`1px solid ${settings[k]?accent:border}`,borderRadius:5,transition:"all 0.15s"}}>
            <span style={{fontSize:15,color:text,letterSpacing:1}}>{label}</span>
            <div style={{width:42,height:24,borderRadius:12,background:settings[k]?accent:"#1e2a3a",

                           borderRadius:"50%",background:settings[k]?bg:"#4a6080",transition:"left 0.2s"}}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── CUSTOM CHECKLIST BUILDER ───────────────────────────────────────────────
function CustomBuilder({onClose,editId,customLists,setCustomLists,settings}){
  const t = uiT(settings);
  const existing = editId ? customLists.find(c=>c.id===editId) : null;
  const [name,setName] = useState(existing?.name||"");
  const [phases,setPhases] = useState(existing?.phases||[{name:"CHECKLIST",items:[""]}]);
  const [activeP,setActiveP] = useState(0);

  const bg = settings.milGreen?"#0d1208":settings.whiteMode?"#f0f4f8":"#0a0e14";
  const border = settings.milGreen?"#3a5020":settings.whiteMode?"#d0dde8":"#1e2a3a";
  const text = settings.milGreen?"#b8c9a0":settings.whiteMode?"#1a2535":"#c8d6e5";
  const accent = settings.milGreen?"#8fbc5a":"#4FC3F7";
  const dim = settings.milGreen?"#5a7040":settings.whiteMode?"#8899aa":"#3a5070";

  const addPhase = ()=>{
    setPhases(ps=>[...ps,{name:"NEW PHASE",items:[""]}]);
    setActiveP(phases.length);
  };
  const removePhase = (i)=>{
    if(phases.length<=1)return;
    const np = phases.filter((_,idx)=>idx!==i);
    setPhases(np);
    setActiveP(Math.min(i,np.length-1));
  };
  const updatePhaseName = (i,v)=>setPhases(ps=>ps.map((p,idx)=>idx===i?{...p,name:v.toUpperCase()}:p));
  const updateItem = (pi,ii,v)=>setPhases(ps=>ps.map((p,idx)=>idx===pi?{...p,items:p.items.map((it,iix)=>iix===ii?v:it)}:p));
  const addItem = (pi)=>setPhases(ps=>ps.map((p,idx)=>idx===pi?{...p,items:[...p.items,""]}:p));
  const removeItem = (pi,ii)=>setPhases(ps=>ps.map((p,idx)=>idx===pi?{...p,items:p.items.filter((_,iix)=>iix!==ii)}:p));

  const save = ()=>{
    if(!name.trim())return;
    const entry = {id:editId||Date.now().toString(),name:name.trim(),phases,color:"#4FC3F7",icon:"✅"};
    if(editId){
      setCustomLists(ls=>ls.map(l=>l.id===editId?entry:l));
    } else {
      setCustomLists(ls=>[...ls,entry]);
    }
    onClose();
  };

  const p = phases[activeP]||phases[0];

  return (
    <div style={{position:"fixed",inset:0,zIndex:200,background:bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 14px 10px",borderBottom:`1px solid ${border}`,flexShrink:0}}>
        <button onClick={onClose} style={{background:"transparent",border:`1px solid ${border}`,color:dim,padding:"5px 10px",borderRadius:4,cursor:"pointer",fontSize:11,letterSpacing:1}}>{t.back}</button>
        <input value={name} onChange={e=>setName(e.target.value)}
               placeholder={t.checklistName}
               style={{flex:1,background:"transparent",border:`1px solid ${border}`,color:text,
                       padding:"6px 10px",borderRadius:4,fontSize:13,outline:"none",letterSpacing:1}}/>
        <button onClick={save} style={{background:accent+"22",border:`1px solid ${accent}`,color:accent,
                                        padding:"6px 12px",borderRadius:4,cursor:"pointer",fontSize:11,letterSpacing:1}}>{t.save}</button>
      </div>

      {/* Phase tabs */}
      <div style={{display:"flex",overflowX:"auto",gap:4,padding:"8px 14px",borderBottom:`1px solid ${border}`,flexShrink:0,
                   scrollbarWidth:"none"}}>
        {phases.map((ph,i)=>(
          <button key={i} onClick={()=>setActiveP(i)}
                  style={{flexShrink:0,padding:"4px 8px",background:i===activeP?accent+"18":"transparent",
                          border:`1px solid ${i===activeP?accent:border}`,color:i===activeP?accent:dim,
                          fontSize:8,letterSpacing:1,cursor:"pointer",borderRadius:3,whiteSpace:"nowrap",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis"}}>
            {ph.name||"PHASE"}
          </button>
        ))}
        <button onClick={addPhase} style={{flexShrink:0,padding:"4px 8px",background:"transparent",
                border:`1px dashed ${dim}`,color:dim,fontSize:8,letterSpacing:1,cursor:"pointer",borderRadius:3}}>
          +
        </button>
      </div>

      {/* Phase edit */}
      <div style={{flex:1,overflow:"auto",padding:"10px 14px"}}>
        {p && (
          <>
            <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
              <input value={p.name} onChange={e=>updatePhaseName(activeP,e.target.value)}
                     placeholder={t.phaseName}
                     style={{flex:1,background:"transparent",border:`1px solid ${border}`,color:accent,
                             padding:"5px 8px",borderRadius:3,fontSize:12,letterSpacing:1,outline:"none"}}/>
              {phases.length>1&&(
                <button onClick={()=>removePhase(activeP)}
                        style={{background:"transparent",border:`1px solid #FF174444`,color:"#FF1744",
                                padding:"4px 8px",borderRadius:3,cursor:"pointer",fontSize:10}}>✕</button>
              )}
            </div>
            {p.items.map((item,ii)=>(
              <div key={ii} style={{display:"flex",gap:6,marginBottom:6,alignItems:"center"}}>
                <div style={{width:16,height:16,border:`1px solid ${border}`,borderRadius:2,flexShrink:0}}/>
                <input value={item} onChange={e=>updateItem(activeP,ii,e.target.value)}
                       placeholder={t.itemText}
                       style={{flex:1,background:"transparent",border:`1px solid ${border}`,color:text,
                               padding:"5px 8px",borderRadius:3,fontSize:13,outline:"none"}}/>
                <button onClick={()=>removeItem(activeP,ii)}
                        style={{background:"transparent",border:"none",color:dim,cursor:"pointer",fontSize:13,padding:"0 4px"}}>✕</button>
              </div>
            ))}
            <button onClick={()=>addItem(activeP)}
                    style={{width:"100%",marginTop:4,padding:"6px 0",background:"transparent",
                            border:`1px dashed ${dim}`,color:dim,fontSize:10,cursor:"pointer",
                            borderRadius:3,letterSpacing:1}}>
              {t.addItem}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

          <button onClick={()=>setConfirmDel(cl.id)}

                          padding:"4px 8px",borderRadius:3,cursor:"pointer",fontSize:9}}>✕</button>

            <div style={{display:"flex",gap:10}}>

              <button onClick={()=>del(confirmDel)} style={{flex:1,padding:"8px 0",background:"#FF174414",border:"1px solid #FF1744",color:"#FF1744",cursor:"pointer",borderRadius:4,fontSize:11}}>{t.deleteChecklist}</button>

// ── EMERGENCY SHEET ────────────────────────────────────────────────────────
function EmergencySheet({emergencies, color, name, registration, onClose, settings}){
  const bg = settings.milGreen?"#140808":settings.whiteMode?"#fff":"#1a0d0d";
  const border = settings.milGreen?"#401818":settings.whiteMode?"#e8d0d0":"#3a1e1e";
  const text = settings.milGreen?"#c9a0a0":settings.whiteMode?"#351a1a":"#e5c8c8";
  const emColor = "#FF5252";

  return (
    <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}
         onClick={onClose}>
      <div className="slide-up" onClick={e=>e.stopPropagation()}
           style={{background:bg,borderTop:`3px solid ${emColor}`,padding:"20px 16px 36px",
                   boxShadow:"0 -8px 40px #0008",maxHeight:"88vh",overflowY:"auto"}}>
        
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <div style={{fontSize:10,letterSpacing:3,color:emColor,marginBottom:3}}>⚠ EMERGENCIES</div>
            <div style={{fontSize:16,fontWeight:"bold",letterSpacing:1.5,color:text}}>
              {name}
              {registration&&<span style={{fontSize:11,marginLeft:8,padding:"2px 7px",background:`${emColor}22`,
                border:`1px solid ${emColor}44`,borderRadius:3,color:emColor,letterSpacing:1}}>{registration}</span>}
            </div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:text,fontSize:22,cursor:"pointer",padding:"4px 8px"}}>✕</button>
        </div>

        {/* List of emergencies */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {emergencies.map((em, idx) => {
            const splitRegex = /[:—]/;
            const parts = em.split(splitRegex);
            const title = parts[0];
            const stepsString = em.substring(title.length + 1).trim();
            const steps = stepsString.split('/').filter(s=>s.trim());
            return (
              <div key={idx} style={{background:`${emColor}0a`, border:`1px solid ${emColor}33`, borderRadius:6, padding:"12px 14px"}}>
                <div style={{fontSize:14, fontWeight:"bold", color:emColor, marginBottom:8, letterSpacing:0.5}}>{title.replace("⚠","").trim()}</div>
                <ul style={{margin:0, paddingLeft:20, color:text, fontSize:settings.largeText?18:16, lineHeight:1.6}}>
                  {steps.map((step, sIdx) => <li key={sIdx} style={{marginBottom:4}}>{step.trim()}</li>)}
                </ul>
              </div>
            );
          })}
        </div>

      </div>
    </div>
  );
}

function ChecklistScreen({aircraftId,onBack,onSettings,settings,customLists}){
  const t = uiT(settings);
  // Support both built-in aircraft and custom aircraft added via Admin
  const ac = AIRCRAFT[aircraftId] || (()=>{
    const adminCustom = loadCustomAC().find(a=>a.id===aircraftId);
    if(!adminCustom) return null;
    // Build a pseudo-aircraft from the custom entry + type defaults
    const baseType = adminCustom.aircraftType||"c152";
    return {
      ...adminCustom,
      checklists:{en:C152_EN,es:C152_ES}, // fallback; override will apply
      speedTable: null, emergencies: null,
    };
  })();
  const isCustom = false; // "Mis Checklists" removed; all aircraft go through ac
  const customEntry = null;
  const _acOvr = ac ? getAcOverride(aircraftId) : null;
  const allPhases = (()=>{
    if(!ac) return {"NO AIRCRAFT":[]};
    const lang = uiLang(settings);
    const clOvr = _acOvr?.checklist?.[lang] || _acOvr?.checklist?.en;
    if(clOvr && Array.isArray(clOvr)) return clArrToObj(clOvr); // Admin override (array format)
    if(ac.checklists) return checklistFor(ac, settings);
    return {"CHECKLIST":[]};
  })();

  const phases = Object.keys(allPhases);
  const [activePhase,setActivePhase] = useState(phases[0]);
  const [checked,setChecked] = useState(()=>loadAcProgress(aircraftId).checked);
  const [completing,setCompleting] = useState({});
  const [showSpeeds,setShowSpeeds] = useState(false);
  const [showEmergencies, setShowEmergencies] = useState(false);
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const tabsRef = useRef(null);

  const color = isCustom ? "#4FC3F7" : ac.color;
  const name = isCustom ? customEntry.name : ac.name;
  const reg = isCustom ? "" : ac.registration;
  const _lang = uiLang(settings);
  // emergencies: override > base aircraft data
  const emList = isCustom ? null
    : (_acOvr?.emergencies?.[_lang] || _acOvr?.emergencies?.en
       || (ac.emergencies ? (ac.emergencies[_lang] || ac.emergencies.en) : null));
  // speedTable: override > base
  const speedTableEff = isCustom ? null : (_acOvr?.speedTable || ac.speedTable);

  const bg = settings.milGreen?"#0d1208":settings.whiteMode?"#f0f4f8":"#0a0e14";
  const cardBg = settings.milGreen?"#141d0a":settings.whiteMode?"#fff":"#0d1624";
  const border = settings.milGreen?"#2a4018":settings.whiteMode?"#d0dde8":"#1e2a3a";
  const text = settings.milGreen?"#b8c9a0":settings.whiteMode?"#1a2535":"#c8d6e5";
  const textDim = settings.milGreen?"#5a7040":settings.whiteMode?"#8899aa":"#3a5070";
  const accentSys = settings.milGreen?"#8fbc5a":"#4FC3F7";

  const items = allPhases[activePhase]||[];
  const accent = isCustom ? accentSys : phaseColor(activePhase);

  const [confirmed,setConfirmed] = useState(()=>loadAcProgress(aircraftId).confirmed);

  // Persist in-progress checklist state to the device on every change.
  useEffect(()=>{ saveAcProgress(aircraftId,checked,confirmed); },[aircraftId,checked,confirmed]);

  const toggle = (phase,idx)=>{
    const key = `${phase}-${idx}`;
    const item = (allPhases[phase]||[])[idx];
    if(item&&item.startsWith("⚠"))return;
    const now = !checked[key];
    if(now){
      setCompleting(c=>({...c,[key]:true}));
      setTimeout(()=>{
        setChecked(c=>({...c,[key]:true}));
        setConfirmed(c=>({...c,[key]:true}));
        setCompleting(c=>{const n={...c};delete n[key];return n;});
      },250);
      if(settings.autoAdvance){
        setTimeout(()=>{
          const its = allPhases[phase]||[];
          const allDoneNow = its.every((_,i)=>i===idx||checked[`${phase}-${i}`]||_?.startsWith("⚠"));
          if(allDoneNow){
            const next = phases[phases.indexOf(phase)+1];
            if(next)setTimeout(()=>setActivePhase(next),400);
          }
        },300);
      }
    } else {
      setChecked(c=>({...c,[key]:false}));
      setConfirmed(c=>{const n={...c};delete n[key];return n;});
    }
  };

  const resetPhase = ()=>{
    const keys = items.map((_,i)=>`${activePhase}-${i}`);
    setChecked(c=>{const n={...c};keys.forEach(k=>delete n[k]);return n;});
    setConfirmed(c=>{const n={...c};keys.forEach(k=>delete n[k]);return n;});
  };

  const doneCount = items.filter((_,i)=>checked[`${activePhase}-${i}`]).length;
  const warnCount = items.filter(it=>it.startsWith("⚠")).length;
  const checkableCount = items.length - warnCount;
  const allDone = checkableCount>0 && doneCount>=checkableCount;

  let displayItems = items.map((it,i)=>({it,i}));
  if(settings.floatDone){
    const undone = displayItems.filter(({it,i})=>!checked[`${activePhase}-${i}`]&&!it.startsWith("⚠"));
    const done = displayItems.filter(({it,i})=>checked[`${activePhase}-${i}`]);
    const warn = displayItems.filter(({it})=>it.startsWith("⚠"));
    displayItems = [...warn,...undone,...done];
  }

  const hasReset = doneCount>0 && activePhase!=="EMERGENCIES" && activePhase!=="URGENCES";

  // Transparencia para la barra inferior (efecto blur nativo)
  const navBarBg = settings.whiteMode ? "rgba(240, 244, 248, 0.95)" : settings.milGreen ? "rgba(13, 18, 8, 0.95)" : "rgba(10, 14, 20, 0.95)";

  return (
    <div style={{minHeight:"100vh",background:bg,display:"flex",flexDirection:"column"}}>
      {showSpeeds&&!isCustom&&speedTableEff&&(
        <SpeedSheet speedTable={speedTableEff} color={color} name={name} registration={reg}
                    onClose={()=>setShowSpeeds(false)} settings={settings}/>
      )}
      {showEmergencies&&!isCustom&&emList&&(
        <EmergencySheet emergencies={emList} color={color} name={name} registration={reg}
                        onClose={()=>setShowEmergencies(false)} settings={settings}/>
      )}

      {/* Menú de confirmación de Reset */}
      {showResetConfirm && (
        <div style={{position:"fixed",inset:0,zIndex:600,background:"#0009",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:cardBg,border:`1px solid ${border}`,borderRadius:10,padding:24,maxWidth:300,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:14,fontWeight:"bold",color:text,marginBottom:20,letterSpacing:0.5}}>{t.confirmReset}</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowResetConfirm(false)} style={{flex:1,padding:"12px 0",background:"transparent",border:`1px solid ${border}`,color:textDim,cursor:"pointer",borderRadius:6,fontSize:12,fontWeight:"bold",letterSpacing:1}}>{t.cancel}</button>
              <button onClick={()=>{
                resetPhase();
                setShowResetConfirm(false);
              }} style={{flex:1,padding:"12px 0",background:"#FF525214",border:"1px solid #FF5252",color:"#FF5252",cursor:"pointer",borderRadius:6,fontSize:12,fontWeight:"bold",letterSpacing:1}}>{t.yesReset}</button>
            </div>
          </div>
        </div>
      )}

      {/* Header superior limpio */}
      <div style={{padding:"16px 16px 10px",borderBottom:`1px solid ${border}`,flexShrink:0}}>
        
        {/* Fila Título e Info */}
        <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:16, paddingLeft:44}}>
          <div style={{width:42,height:42,background:`${color}18`,border:`1px solid ${color}44`,
                       borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:24}}>
            {isCustom?<UserLogo size={32} color={color}/>:(ac.icon||"✈")}
          </div>
          
          <div style={{flex:1}}>
            <div style={{fontSize:10,letterSpacing:3,color,marginBottom:2}}>{isCustom?"CUSTOM":(ac.type.toUpperCase())}</div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <div style={{fontSize:18,fontWeight:"bold",letterSpacing:1,color:text}}>{name}</div>
              {reg&&<div style={{fontSize:11,padding:"3px 8px",background:`${color}22`,border:`1px solid ${color}44`,borderRadius:4,color,fontWeight:"bold",letterSpacing:1}}>{reg}</div>}
            </div>
          </div>
          
          <div style={{textAlign:"right",minWidth:50}}>
            <div style={{fontSize:10,color:textDim,letterSpacing:2,marginBottom:4}}>{t.phase}</div>
            <div style={{fontSize:16,fontWeight:"bold",color:allDone?"#4CAF50":accent}}>{allDone?t.done:`${doneCount}/${checkableCount}`}</div>
          </div>
        </div>

        {/* Progress Bar */}
        <div style={{height:4,background:`${border}`,borderRadius:2,marginBottom:12,overflow:"hidden"}}>
          <div style={{height:"100%",background:allDone?"#4CAF50":accent,
                       width:`${checkableCount>0?(doneCount/checkableCount)*100:0}%`,
                       transition:"width 0.3s",boxShadow:allDone?"0 0 8px #4CAF50":undefined}}/>
        </div>

        {/* Phase tabs */}
        <div ref={tabsRef} style={{display:"flex",overflowX:"auto",gap:6,scrollbarWidth:"none",WebkitOverflowScrolling:"touch",paddingBottom:2}}>
          {phases.map(phase=>{
            const pColor = isCustom ? accentSys : phaseColor(phase);
            const isActive = phase===activePhase;
            const pItems = allPhases[phase]||[];
            const pWarn = pItems.filter(it=>it.startsWith("⚠")).length;
            const pDone = pItems.filter((_,i)=>checked[`${phase}-${i}`]).length;
            const pDoneAll = pItems.length-pWarn>0 && pDone>=(pItems.length-pWarn);
            return (
              <button key={phase} onClick={()=>setActivePhase(phase)}
                      style={{flexShrink:0,padding:"8px 14px",background:isActive?`${pColor}18`:`${border}33`,
                              border:`1px solid ${isActive?pColor:border}`,borderRadius:6,fontWeight:isActive?"bold":"normal",
                              color:isActive?pColor:textDim,fontSize:12,letterSpacing:0.5,cursor:"pointer",transition:"all 0.2s",
                              whiteSpace:"nowrap"}}>
                {pDoneAll?"✓ ":""}{phase}
              </button>
            );
          })}
        </div>
      </div>

      {/* Items List (Con padding inferior amplio para que no tape la barra de navegación) */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 16px 100px"}}>
        <div style={{fontSize:14,fontWeight:"bold",letterSpacing:2,color:accent,marginBottom:16}}>{activePhase}</div>
        
        {displayItems.map(({it,i})=>{
          const key = `${activePhase}-${i}`;
          const done = !!checked[key];
          const isWarn = it.startsWith("⚠");
          const isCompleting = !!completing[key];
          const isConfirmed = !!confirmed[key];
          return (
            <div key={i} onClick={()=>toggle(activePhase,i)}
                 style={{display:"flex",
                         alignItems: settings.centerText ? "center" : "flex-start",
                         gap:12,padding:"14px 16px",
                         marginBottom:8,borderRadius:8,cursor:isWarn?"default":"pointer",
                         background:isConfirmed?"#00ff8808":isCompleting?`${accent}10`:isWarn?`${border}11`:`${border}22`,
                         border:`1px solid ${isConfirmed?"#4CAF5044":isWarn?"#FF174433":border}`,
                         transition:"all 0.2s ease-in-out"}}>
              {!isWarn&&(
                <div style={{width:settings.largeText?30:24,height:settings.largeText?30:24,border:`2px solid ${(done||isCompleting)?"#4CAF50":accent+"66"}`,borderRadius:6,
                             flexShrink:0,background:(done||isCompleting)?"#4CAF50":"transparent",
                             display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",marginTop:0}}>
                  {(done||isCompleting)&&<span style={{color:"#000",fontSize:settings.largeText?18:14,fontWeight:"bold",lineHeight:1}}>✓</span>}
                </div>
              )}
              {!isWarn&&<span style={{fontSize:settings.largeText?18:16,color:textDim,width:settings.largeText?28:24,flexShrink:0,letterSpacing:1,paddingTop: settings.centerText ? 0 : 2,fontWeight:"bold", textAlign: settings.centerText ? "center" : "left"}}>{String(i+1).padStart(2,"0")}</span>}
              <span style={{fontSize:isWarn?(settings.largeText?18:16):(settings.largeText?24:18),letterSpacing:0.2,fontWeight:isWarn?"bold":"normal",
                            color:isConfirmed?"#4CAF50":isWarn?"#FF5252":text,
                            textDecoration:isConfirmed?"line-through":"none",
                            transition:"all 0.2s",flex:1,lineHeight:1.5,
                            textAlign: settings.centerText ? "center" : "left"
                            }}>
                {it}
              </span>
            </div>
          );
        })}
        {allDone&&(
          <div style={{marginTop:20,padding:"16px 20px",background:"#4CAF5014",border:"1px solid #4CAF5044",
                       borderRadius:8,textAlign:"center",color:"#4CAF50",fontSize:14,fontWeight:"bold",letterSpacing:2,animation:"fadeIn 0.4s ease"}}>
            ✓ {t.done}
          </div>
        )}
      </div>

      {/* Barra de Navegación Inferior Estilo Nativo */}
      <div style={{
        position:"fixed", bottom:0, left:0, right:0,
        background: navBarBg, borderTop:`1px solid ${border}`,
        display:"flex", alignItems:"center", justifyContent:"space-around",
        padding:"10px 10px", paddingBottom:"calc(10px + env(safe-area-inset-bottom, 0px))",
        zIndex:100, backdropFilter:"blur(12px)", WebkitBackdropFilter:"blur(12px)"
      }}>
        <button onClick={onBack} style={{flex:1, background:"transparent", border:"none", color:textDim, display:"flex", flexDirection:"column", alignItems:"center", gap:5, cursor:"pointer"}}>
          <span style={{fontSize:22, lineHeight:1}}>‹</span>
          <span style={{fontSize:10, fontWeight:"bold", letterSpacing:1}}>{t.back.replace('‹ ','').toUpperCase()}</span>
        </button>

        {!isCustom && speedTableEff && (
          <button onClick={()=>setShowSpeeds(true)} style={{flex:1, background:"transparent", border:"none", color:color, display:"flex", flexDirection:"column", alignItems:"center", gap:5, cursor:"pointer"}}>
            <span style={{fontSize:18, lineHeight:1, marginTop:2}}>✈</span>
            <span style={{fontSize:10, fontWeight:"bold", letterSpacing:1}}>SPEEDS</span>
          </button>
        )}

        {!isCustom && emList && (
          <button onClick={()=>setShowEmergencies(true)} style={{flex:1, background:"transparent", border:"none", color:"#FF5252", display:"flex", flexDirection:"column", alignItems:"center", gap:5, cursor:"pointer"}}>
            <span style={{fontSize:18, lineHeight:1, marginTop:2}}>⚠</span>
            <span style={{fontSize:10, fontWeight:"bold", letterSpacing:1}}>EMERG.</span>
          </button>
        )}

        <button onClick={()=>setShowResetConfirm(true)} style={{flex:1, background:"transparent", border:"none", color:hasReset ? text : textDim, opacity: hasReset ? 1 : 0.5, display:"flex", flexDirection:"column", alignItems:"center", gap:5, cursor:hasReset?"pointer":"default"}} disabled={!hasReset}>
          <span style={{fontSize:18, lineHeight:1, marginTop:2}}>↺</span>
          <span style={{fontSize:10, fontWeight:"bold", letterSpacing:1}}>RESET</span>
        </button>

        <button onClick={onSettings} style={{flex:1, background:"transparent", border:"none", color:textDim, display:"flex", flexDirection:"column", alignItems:"center", gap:5, cursor:"pointer"}}>
          <span style={{fontSize:20, lineHeight:1, marginTop:2}}>⚙</span>
          <span style={{fontSize:10, fontWeight:"bold", letterSpacing:1}}>SETTINGS</span>
        </button>
      </div>

    </div>
  );
}

// ── WEIGHT & BALANCE ────────────────────────────────────────────────────────
// CG envelope chart (Center of Gravity Limits). Plots weight (Y) vs CG (X),
// draws the certified envelope polygon, the max-gross line, and the loaded point.
function WBEnvelopeChart({envelope,maxGross,cg,totalW,statusColor,inLimits,colors}){
  const {text,textDim,border,accent,cardBg}=colors;
  const pts=[...(envelope||[])].sort((a,b)=>a.w-b.w);
  if(pts.length<2) return null;
  const W=320,H=270, m={l:46,r:14,t:16,b:38};
  const pw=W-m.l-m.r, ph=H-m.t-m.b;
  // domains (with padding)
  const allCg=pts.flatMap(p=>[p.fwd,p.aft]);
  let minCG=Math.min(...allCg), maxCG=Math.max(...allCg);
  const cgPad=(maxCG-minCG)*0.12||1; minCG-=cgPad; maxCG+=cgPad;
  let minW=pts[0].w, maxW=Math.max(maxGross,pts[pts.length-1].w);
  const wPad=(maxW-minW)*0.10||50; minW-=wPad; maxW+=wPad;
  const sx=v=>m.l+( (v-minCG)/(maxCG-minCG) )*pw;
  const sy=v=>m.t+( 1-(v-minW)/(maxW-minW) )*ph;
  // envelope polygon: fwd boundary (ascending weight) then aft (descending weight)
  const fwdPath=pts.map(p=>`${sx(p.fwd)},${sy(p.w)}`);
  const aftPath=[...pts].reverse().map(p=>`${sx(p.aft)},${sy(p.w)}`);
  const poly=[...fwdPath,...aftPath].join(" ");
  // ticks
  const xticks=[],yticks=[];
  const nicestep=(range,n)=>{ const raw=range/n; const mag=Math.pow(10,Math.floor(Math.log10(raw))); const r=raw/mag; const s=r>=5?5:r>=2?2:1; return s*mag; };
  const xs=nicestep(maxCG-minCG,4); for(let v=Math.ceil(minCG/xs)*xs; v<=maxCG; v+=xs) xticks.push(+v.toFixed(2));
  const ys=nicestep(maxW-minW,5); for(let v=Math.ceil(minW/ys)*ys; v<=maxW; v+=ys) yticks.push(Math.round(v));
  const ptX=sx(Math.max(minCG,Math.min(maxCG,cg))), ptY=sy(Math.max(minW,Math.min(maxW,totalW)));
  const showPt=totalW>0;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      {/* grid + axes */}
      {xticks.map(v=>(<g key={"x"+v}>
        <line x1={sx(v)} y1={m.t} x2={sx(v)} y2={m.t+ph} stroke={border} strokeWidth="0.5" opacity="0.5"/>
        <text x={sx(v)} y={m.t+ph+13} fill={textDim} fontSize="8" textAnchor="middle">{v}</text>
      </g>))}
      {yticks.map(v=>(<g key={"y"+v}>
        <line x1={m.l} y1={sy(v)} x2={m.l+pw} y2={sy(v)} stroke={border} strokeWidth="0.5" opacity="0.5"/>
        <text x={m.l-5} y={sy(v)+3} fill={textDim} fontSize="8" textAnchor="end">{v}</text>
      </g>))}
      <rect x={m.l} y={m.t} width={pw} height={ph} fill="none" stroke={border} strokeWidth="1"/>
      {/* envelope */}
      <polygon points={poly} fill={`${accent}1f`} stroke={accent} strokeWidth="1.6" strokeLinejoin="round"/>
      {/* max gross line */}
      <line x1={m.l} y1={sy(maxGross)} x2={m.l+pw} y2={sy(maxGross)} stroke="#FF5252" strokeWidth="1" strokeDasharray="4 3" opacity="0.8"/>
      <text x={m.l+pw-2} y={sy(maxGross)-3} fill="#FF5252" fontSize="7.5" textAnchor="end">MTOW {maxGross}</text>
      {/* loaded point */}
      {showPt&&<g>
        <line x1={ptX} y1={m.t} x2={ptX} y2={m.t+ph} stroke={statusColor} strokeWidth="0.6" strokeDasharray="2 2" opacity="0.6"/>
        <line x1={m.l} y1={ptY} x2={m.l+pw} y2={ptY} stroke={statusColor} strokeWidth="0.6" strokeDasharray="2 2" opacity="0.6"/>
        <circle cx={ptX} cy={ptY} r="5" fill={statusColor} stroke={cardBg} strokeWidth="1.5"/>
      </g>}
      {/* axis titles */}
      <text x={m.l+pw/2} y={H-3} fill={textDim} fontSize="8.5" textAnchor="middle">C.G. ARM (in aft of datum)</text>
      <text x={11} y={m.t+ph/2} fill={textDim} fontSize="8.5" textAnchor="middle" transform={`rotate(-90 11 ${m.t+ph/2})`}>WEIGHT (lbs)</text>
    </svg>
  );
}

function WBCalculatorScreen({aircraftId,onBack,onSettings,settings}){
  const ac = AIRCRAFT[aircraftId];
  const _ovr = getAcOverride(aircraftId);
  // wb override > WB_DATA[type] defaults
  const _baseWb = WB_DATA[ac.aircraftType] || WB_DATA.c152;
  const _defaultEmpty = WB_EMPTY[aircraftId] || {w:1200, arm:40.0};
  const wbData = _ovr?.wb ? _ovr.wb : {..._baseWb, emptyW:_defaultEmpty.w, emptyArm:_defaultEmpty.arm, emptyMom:_defaultEmpty.mom};
  const empty = {w: wbData.emptyW || _defaultEmpty.w, arm: wbData.emptyArm || _defaultEmpty.arm, mom: parseFloat(wbData.emptyMom)||0};
  const bg = settings.milGreen?"#0d1208":settings.whiteMode?"#f0f4f8":"#0a0e14";
  const cardBg = settings.milGreen?"#141d0a":settings.whiteMode?"#fff":"#0d1624";
  const border = settings.milGreen?"#2a4018":settings.whiteMode?"#d0dde8":"#1e2a3a";
  const text = settings.milGreen?"#b8c9a0":settings.whiteMode?"#1a2535":"#c8d6e5";
  const textDim = settings.milGreen?"#5a7040":settings.whiteMode?"#8899aa":"#3a5070";
  const accent = ac.color;
  const [vals,setVals] = useState({});
  const [emptyOverride,setEmptyOverride] = useState({w:"",arm:""});
  const upd = (id,v)=>setVals(p=>({...p,[id]:v}));
  const empW = emptyOverride.w!==""?(parseFloat(emptyOverride.w)||0):empty.w;
  const empArm = emptyOverride.arm!==""?(parseFloat(emptyOverride.arm)||0):empty.arm;
  // Use the certificate's precise empty moment when it's configured and the pilot
  // hasn't manually overridden the empty weight or arm for this calculation.
  const emMom = (empty.mom>0 && emptyOverride.w==="" && emptyOverride.arm==="") ? empty.mom : empW*empArm;
  const totals = wbData.stations.reduce((acc,st)=>{
    const raw=parseFloat(vals[st.id])||0;
    const w=st.isFuel?raw*st.density:raw;
    return {w:acc.w+w,m:acc.m+w*st.arm};
  },{w:0,m:0});
  const totalW=empW+totals.w, totalM=emMom+totals.m, cg=totalW>0?totalM/totalW:0;
  const overW=totalW>wbData.maxGross;
  const lim=cgLimitsAt(totalW,wbData.envelope);
  const cgOk=totalW>0&&cg>=lim.fwd&&cg<=lim.aft;
  const sc=overW?"#FF5252":!cgOk?"#FF9800":"#4CAF50";
  const stMsg=overW?"OVER WEIGHT! / SOBREPESO":!cgOk?"CG OUT OF RANGE / FUERA DE RANGO":"WITHIN LIMITS ✓ / DENTRO DE LÍMITES";
  // table styling
  const th={fontSize:9,letterSpacing:0.5,color:textDim,fontWeight:"bold",padding:"7px 6px",textAlign:"center",borderBottom:`1px solid ${border}`};
  const thItem={...th,textAlign:"left"};
  const td={fontSize:11,color:text,padding:"5px 6px",textAlign:"center",borderBottom:`1px solid ${border}`,verticalAlign:"middle"};
  const tdItem={...td,textAlign:"left"};
  const cellInp={width:"100%",maxWidth:74,background:settings.whiteMode?"#fff":"#0a0e14",border:`1px solid ${border}`,color:text,padding:"6px 5px",borderRadius:4,fontSize:12,outline:"none",textAlign:"right"};
  return (
    <div style={{minHeight:"100vh",background:bg,padding:"16px 14px 100px"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingLeft:44}}>
        <div style={{flex:1}}>
          <div style={{fontSize:10,letterSpacing:3,color:accent}}>{uiT(settings).wbTitle}</div>
          <div style={{fontSize:16,fontWeight:"bold",color:text}}>{ac.name} <span style={{fontSize:11,color:accent,padding:"2px 6px",background:`${accent}22`,border:`1px solid ${accent}44`,borderRadius:3}}>{ac.registration}</span></div>
        </div>
      </div>

      {/* ── Loading table (mirrors the official W&B form) ── */}
      <div style={{background:cardBg,border:`1px solid ${border}`,borderRadius:8,overflow:"hidden",marginBottom:10}}>
        <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
          <colgroup>
            <col style={{width:"42%"}}/><col style={{width:"22%"}}/><col style={{width:"14%"}}/><col style={{width:"22%"}}/>
          </colgroup>
          <thead>
            <tr style={{background:settings.whiteMode?"#1a2535":"#000"}}>
              <th style={{...thItem,color:"#fff",borderBottom:"none"}}>ITEM</th>
              <th style={{...th,color:"#fff",borderBottom:"none"}}>WEIGHT<br/><span style={{fontSize:8,fontWeight:"normal"}}>(Lbs)</span></th>
              <th style={{...th,color:"#fff",borderBottom:"none"}}>ARM<br/><span style={{fontSize:8,fontWeight:"normal"}}>(In)</span></th>
              <th style={{...th,color:"#fff",borderBottom:"none"}}>MOMENT<br/><span style={{fontSize:8,fontWeight:"normal"}}>(Lb·In)</span></th>
            </tr>
          </thead>
          <tbody>
            {/* Basic Empty Weight — editable */}
            <tr>
              <td style={tdItem}>Basic Empty Weight<div style={{fontSize:8,color:textDim}}>Unusable fuel &amp; full oil</div></td>
              <td style={td}><input type="number" value={emptyOverride.w} placeholder={String(empty.w)} onChange={e=>setEmptyOverride(p=>({...p,w:e.target.value}))} style={cellInp}/></td>
              <td style={td}><input type="number" value={emptyOverride.arm} placeholder={String(empty.arm)} onChange={e=>setEmptyOverride(p=>({...p,arm:e.target.value}))} style={cellInp}/></td>
              <td style={{...td,color:textDim}}>{emMom.toFixed(0)}</td>
            </tr>
            {/* Stations */}
            {wbData.stations.map(st=>{
              const raw=vals[st.id]||""; const parsed=parseFloat(raw)||0;
              const w=st.isFuel?parsed*st.density:parsed; const m=w*st.arm;
              const over=st.max&&((st.isFuel?parsed:w)>st.max);
              return (
                <tr key={st.id}>
                  <td style={tdItem}>
                    {st.label}
                    <div style={{fontSize:8,color:over?"#FF9800":textDim}}>Max {st.max} {st.isFuel?"gal":"lbs"}</div>
                  </td>
                  <td style={td}>
                    <input type="number" value={raw} onChange={e=>upd(st.id,e.target.value)} placeholder={st.isFuel?"gal":"lbs"} style={cellInp}/>
                    {st.isFuel&&parsed>0&&<div style={{fontSize:8,color:textDim,marginTop:2}}>{w.toFixed(2)} lbs</div>}
                  </td>
                  <td style={{...td,color:textDim}}>{st.arm}</td>
                  <td style={{...td,color:textDim}}>{m.toFixed(0)}</td>
                </tr>
              );
            })}
            {/* Total */}
            <tr style={{background:`${accent}14`}}>
              <td style={{...tdItem,fontWeight:"bold",color:accent,borderBottom:"none"}}>TOTAL WEIGHT &amp; MOMENT</td>
              <td style={{...td,fontWeight:"bold",color:overW?"#FF5252":text,borderBottom:"none"}}>{totalW.toFixed(2)}</td>
              <td style={{...td,borderBottom:"none"}}/>
              <td style={{...td,fontWeight:"bold",color:text,borderBottom:"none"}}>{totalM.toFixed(0)}</td>
            </tr>
          </tbody>
        </table>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",borderTop:`1px solid ${border}`,fontSize:10,color:textDim}}>
          <span>Max Take Off Weight: <b style={{color:text}}>{wbData.maxGross} lbs</b></span>
          <span>C.G. = M/W = <b style={{color:sc}}>{cg.toFixed(2)} in</b></span>
        </div>
      </div>

      {/* ── Status ── */}
      <div style={{background:`${sc}14`,border:`2px solid ${sc}55`,borderRadius:10,padding:"12px 14px",marginBottom:10}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
          {[{l:"PESO · WEIGHT",v:`${totalW.toFixed(2)}`,s:`Max ${wbData.maxGross} lbs`},
            {l:"C.G.",v:`${cg.toFixed(2)}`,s:`Limits ${lim.fwd.toFixed(1)}–${lim.aft.toFixed(1)} in`},
            {l:"MOMENT",v:totalM.toFixed(0),s:"lb·in"}
          ].map(({l,v,s})=>(
            <div key={l} style={{textAlign:"center",background:cardBg,borderRadius:6,padding:"8px 4px"}}>
              <div style={{fontSize:9,letterSpacing:1,color:textDim,marginBottom:4}}>{l}</div>
              <div style={{fontSize:15,fontWeight:"bold",color:text}}>{v}</div>
              <div style={{fontSize:8,color:textDim}}>{s}</div>
            </div>
          ))}
        </div>
        <div style={{textAlign:"center",fontSize:13,fontWeight:"bold",letterSpacing:1.5,color:sc}}>{stMsg}</div>
      </div>

      {/* ── CG Envelope ── */}
      <div style={{background:cardBg,border:`1px solid ${border}`,borderRadius:10,padding:"12px 12px 8px"}}>
        <div style={{fontSize:10,letterSpacing:2,color:accent,marginBottom:6,textAlign:"center"}}>CENTER OF GRAVITY LIMITS · ENVELOPE</div>
        <WBEnvelopeChart envelope={wbData.envelope} maxGross={wbData.maxGross} cg={cg} totalW={totalW}
                         statusColor={sc} inLimits={cgOk&&!overW} colors={{text,textDim,border,accent,cardBg}}/>
        <div style={{fontSize:8.5,color:textDim,textAlign:"center",marginTop:4}}>
          {totalW>0?<span>Loaded point plotted in <b style={{color:sc}}>{overW?"red (over MTOW)":cgOk?"green (within limits)":"amber (out of range)"}</b></span>:"Enter weights to plot the loaded point"}
        </div>
      </div>
      <BottomNavBar onBack={onBack} onSettings={onSettings} settings={settings}/>
    </div>
  );
}

// ── Admin: Checklist editor sub-panel ──────────────────────────────────────
function AdminClEditor({phases, onChange, colors}){
  const {border,text,textDim,accent}=colors;
  const [activeP,setActiveP]=useState(0);
  const p=phases[activeP]||phases[0]||{name:"",items:[]};
  const upd=(fn)=>{ const np=fn([...phases]); onChange(np); };
  const updName=(i,v)=>upd(ps=>{ps[i]={...ps[i],name:v.toUpperCase()};return ps;});
  const updItem=(pi,ii,v)=>upd(ps=>{ps[pi]={...ps[pi],items:ps[pi].items.map((it,iix)=>iix===ii?v:it)};return ps;});
  const addItem=(pi)=>upd(ps=>{ps[pi]={...ps[pi],items:[...ps[pi].items,""]};return ps;});
  const remItem=(pi,ii)=>upd(ps=>{ps[pi]={...ps[pi],items:ps[pi].items.filter((_,iix)=>iix!==ii)};return ps;});
  const addPhase=()=>{ upd(ps=>[...ps,{name:"NEW PHASE",items:[""]}]); setActiveP(phases.length); };
  const remPhase=(i)=>{ if(phases.length<=1)return; upd(ps=>ps.filter((_,idx)=>idx!==i)); setActiveP(Math.max(0,i-1)); };
  return (
    <div>
      <div style={{display:"flex",overflowX:"auto",gap:4,marginBottom:8,scrollbarWidth:"none"}}>
        {phases.map((ph,i)=>(
          <button key={i} onClick={()=>setActiveP(i)}
                  style={{flexShrink:0,padding:"4px 8px",background:i===activeP?accent+"18":"transparent",border:`1px solid ${i===activeP?accent:border}`,color:i===activeP?accent:textDim,fontSize:8,cursor:"pointer",borderRadius:3,whiteSpace:"nowrap"}}>
            {ph.name||"PHASE"}
          </button>
        ))}
        <button onClick={addPhase} style={{flexShrink:0,padding:"4px 8px",background:"transparent",border:`1px dashed ${textDim}`,color:textDim,fontSize:8,cursor:"pointer",borderRadius:3}}>+</button>
      </div>
      {p&&(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input value={p.name} onChange={e=>updName(activeP,e.target.value)}
                   style={{flex:1,background:"transparent",border:`1px solid ${border}`,color:accent,padding:"5px 8px",borderRadius:3,fontSize:12,outline:"none"}}/>
            {phases.length>1&&<button onClick={()=>remPhase(activeP)} style={{background:"transparent",border:"1px solid #FF174444",color:"#FF1744",padding:"4px 8px",borderRadius:3,cursor:"pointer",fontSize:10}}>✕</button>}
          </div>
          {p.items.map((item,ii)=>(
            <div key={ii} style={{display:"flex",gap:6,marginBottom:5,alignItems:"center"}}>
              <div style={{width:14,height:14,border:`1px solid ${border}`,borderRadius:2,flexShrink:0}}/>
              <input value={item} onChange={e=>updItem(activeP,ii,e.target.value)} placeholder="Item..."
                     style={{flex:1,background:"transparent",border:`1px solid ${border}`,color:text,padding:"4px 8px",borderRadius:3,fontSize:12,outline:"none"}}/>
              <button onClick={()=>remItem(activeP,ii)} style={{background:"transparent",border:"none",color:textDim,cursor:"pointer",fontSize:12,padding:"0 3px"}}>✕</button>
            </div>
          ))}
          <button onClick={()=>addItem(activeP)} style={{width:"100%",marginTop:4,padding:"5px 0",background:"transparent",border:`1px dashed ${textDim}`,color:textDim,fontSize:10,cursor:"pointer",borderRadius:3}}>+ ITEM</button>
        </div>
      )}
    </div>
  );
}

// ── Admin: Single aircraft full editor ─────────────────────────────────────
function AdminAcEditor({acId, acBase, onBack, settings, colors}){
  const {border,text,textDim,accent,bg,cardBg}=colors;
  const [tab,setTab]=useState("checklist");
  const [clLang,setClLang]=useState(uiLang(settings));
  const lang=uiLang(settings);
  // Load existing override or build defaults from base aircraft data
  const initOverride=()=>{
    const existing=getAcOverride(acId);
    if(existing) return existing;
    const baseAc=acBase;
    return {
      checklist:{
        en: baseAc.checklists?.en ? clObjToArr(baseAc.checklists.en) : [{name:"CHECKLIST",items:[""]}],
        es: baseAc.checklists?.es ? clObjToArr(baseAc.checklists.es) : [{name:"CHECKLIST",items:[""]}],
      },
      speedTable: baseAc.speedTable ? JSON.parse(JSON.stringify(baseAc.speedTable)) : {unit:"KIAS",rows:[],ops:[],limits:[]},
      emergencies:{
        en: baseAc.emergencies?.en ? [...baseAc.emergencies.en] : [],
        es: baseAc.emergencies?.es ? [...baseAc.emergencies.es] : [],
      },
      wb: (()=>{
        const wbd=WB_DATA[baseAc.aircraftType]||WB_DATA.c152;
        const emp=WB_EMPTY[acId]||{w:1200,arm:40.0};
        return { emptyW:emp.w, emptyArm:emp.arm, emptyMom:emp.mom, stations:JSON.parse(JSON.stringify(wbd.stations)), maxGross:wbd.maxGross, envelope:JSON.parse(JSON.stringify(wbd.envelope)) };
      })(),
    };
  };
  const [ovr,setOvr]=useState(initOverride);
  const [saved,setSaved]=useState(false);

  const save=()=>{ saveAcOverride(acId,ovr); setSaved(true); setTimeout(()=>setSaved(false),2000); };

  const updCl=(lang2,phases)=>setOvr(o=>({...o,checklist:{...o.checklist,[lang2]:phases}}));
  const TABS=[{id:"checklist",l:"CHECKLIST"},{id:"speeds",l:"SPEEDS"},{id:"emerg",l:"EMERG."},{id:"wb",l:"P&B"}];

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexShrink:0,paddingLeft:44}}>
        <button onClick={onBack} style={{background:"transparent",border:`1px solid ${border}`,color:textDim,padding:"5px 10px",borderRadius:4,cursor:"pointer",fontSize:11}}>‹</button>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:accent,letterSpacing:1}}>{acBase.name}</div>
          <div style={{fontSize:10,color:textDim}}>{acBase.registration}</div>
        </div>
        <button onClick={save}
                style={{padding:"7px 14px",background:saved?"#4CAF5022":accent+"22",border:`1px solid ${saved?"#4CAF50":accent}`,color:saved?"#4CAF50":accent,fontSize:11,cursor:"pointer",borderRadius:4,letterSpacing:1,transition:"all 0.2s"}}>
          {saved?"✓ SAVED":"GUARDAR"}
        </button>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:10,flexShrink:0}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
                  style={{flex:1,padding:"7px 2px",background:tab===t.id?accent+"18":"transparent",border:`1px solid ${tab===t.id?accent:border}`,color:tab===t.id?accent:textDim,fontSize:9,letterSpacing:1,cursor:"pointer",borderRadius:4}}>
            {t.l}
          </button>
        ))}
      </div>
      <div style={{flex:1,overflow:"auto"}}>
        {tab==="checklist"&&(
          <div>
            <div style={{display:"flex",gap:6,marginBottom:10}}>
              {["en","es"].map(l=>(
                <button key={l} onClick={()=>setClLang(l)}
                        style={{flex:1,padding:"7px 0",background:clLang===l?accent+"18":"transparent",border:`1px solid ${clLang===l?accent:border}`,color:clLang===l?accent:textDim,fontSize:11,cursor:"pointer",borderRadius:4,letterSpacing:2}}>
                  {l.toUpperCase()}
                </button>
              ))}
            </div>
            <AdminClEditor
              phases={ovr.checklist[clLang]||[{name:"CHECKLIST",items:[""]}]}
              onChange={phases=>updCl(clLang,phases)}
              colors={colors}/>
          </div>
        )}
        {tab==="speeds"&&ovr.speedTable&&(
          <AdminSpeedEditor speedTable={ovr.speedTable} onChange={st=>setOvr(o=>({...o,speedTable:st}))} colors={colors}/>
        )}
        {tab==="emerg"&&(
          <AdminEmEditor emergencies={ovr.emergencies||{en:[],es:[]}} onChange={em=>setOvr(o=>({...o,emergencies:em}))} colors={colors}/>
        )}
        {tab==="wb"&&(
          <AdminWBEditor wb={ovr.wb} onChange={wb=>setOvr(o=>({...o,wb}))} colors={colors}/>
        )}
      </div>
    </div>
  );
}

function AdminScreen({onBack,onSettings,settings}){
  const t=uiT(settings);
  const [adminCfg]=useState(loadAdminCfg);
  const [isAuth,setIsAuth]=useState(false);
  const [pw,setPw]=useState("");
  const [pwErr,setPwErr]=useState(false);
  const [customAC,setCustomAC]=useState(loadCustomAC);
  const [editingAcId,setEditingAcId]=useState(null); // null=list, id=editor
  const [addingNew,setAddingNew]=useState(false);

  const bg=settings.milGreen?"#0d1208":settings.whiteMode?"#f0f4f8":"#0a0e14";
  const cardBg=settings.milGreen?"#141d0a":settings.whiteMode?"#fff":"#0d1624";
  const border=settings.milGreen?"#2a4018":settings.whiteMode?"#d0dde8":"#1e2a3a";
  const text=settings.milGreen?"#b8c9a0":settings.whiteMode?"#1a2535":"#c8d6e5";
  const textDim=settings.milGreen?"#5a7040":settings.whiteMode?"#8899aa":"#3a5070";
  const accent=settings.milGreen?"#8fbc5a":"#4FC3F7";
  const colors={bg,cardBg,border,text,textDim,accent};

  const defPw=adminCfg.password||"admin1234";
  const tryLogin=()=>{ if(pw===defPw){setIsAuth(true);setPwErr(false);}else{setPwErr(true);} };
  const updCustomAC=(list)=>{ setCustomAC(list); saveCustomAC(list); };

  if(!isAuth){
    return (
      <div style={{minHeight:"100vh",background:bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{fontSize:40,marginBottom:12}}>🔐</div>

        <div style={{width:"100%",maxWidth:320}}>
          <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setPwErr(false);}}
                 onKeyDown={e=>e.key==="Enter"&&tryLogin()} placeholder="Contraseña / Password"
                 style={{width:"100%",background:"transparent",border:`1px solid ${pwErr?"#FF5252":border}`,color:text,
                         padding:"12px 14px",borderRadius:6,fontSize:14,outline:"none",marginBottom:8,textAlign:"center",boxSizing:"border-box"}}/>
          {pwErr&&<div style={{color:"#FF5252",fontSize:11,textAlign:"center",marginBottom:8,letterSpacing:1}}>CONTRASEÑA INCORRECTA</div>}
          <button onClick={tryLogin} style={{width:"100%",padding:"12px 0",background:`${accent}22`,border:`1px solid ${accent}`,color:accent,fontSize:13,letterSpacing:2,cursor:"pointer",borderRadius:6,marginBottom:10}}>INGRESAR</button>
          <button onClick={onBack} style={{width:"100%",padding:"10px 0",background:"transparent",border:`1px solid ${border}`,color:textDim,fontSize:11,letterSpacing:1,cursor:"pointer",borderRadius:4}}>‹ VOLVER / BACK</button>
        </div>
        <div style={{position:"absolute",bottom:30,fontSize:10,color:textDim,letterSpacing:1,textAlign:"center"}}>Contraseña por defecto: admin1234</div>
      </div>
    );
  }

  // Show full editor for a single aircraft
  if(editingAcId){
    const isBuiltIn=!!AIRCRAFT[editingAcId];
    const acBase=isBuiltIn ? AIRCRAFT[editingAcId] : customAC.find(a=>a.id===editingAcId);
    if(!acBase) return null;
    return (
      <div style={{minHeight:"100vh",background:bg,padding:"16px 14px 20px",display:"flex",flexDirection:"column"}}>
        <AdminAcEditor acId={editingAcId} acBase={acBase} onBack={()=>setEditingAcId(null)} settings={settings} colors={colors}/>
      </div>
    );
  }

  // Show form to add new custom aircraft
  if(addingNew){
    return (
      <div style={{minHeight:"100vh",background:bg,padding:"16px 14px 20px"}}>
        <AircraftEditor initial={null}
          onSave={ac=>{ const withId={...ac,id:"custom-"+Date.now()}; updCustomAC([...customAC,withId]); setAddingNew(false); }}
          onCancel={()=>setAddingNew(false)} colors={colors}/>
      </div>
    );
  }

  // Aircraft list
  const allAc=[
    ...Object.entries(AIRCRAFT).map(([id,ac])=>({id,...ac,isBuiltIn:true})),
    ...customAC.map(ac=>({...ac,isBuiltIn:false})),
  ];
  const hasOvr=(id)=>!!getAcOverride(id);

  return (
    <div style={{minHeight:"100vh",background:bg,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 14px 10px 58px",borderBottom:`1px solid ${border}`,flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
        <div style={{flex:1,fontSize:11,letterSpacing:4,color:accent}}>{t.adminTitle}</div>
        <button onClick={()=>setIsAuth(false)} style={{background:"transparent",border:"none",color:textDim,fontSize:10,cursor:"pointer"}}>SALIR</button>
      </div>
      <div style={{flex:1,overflow:"auto",padding:"14px 14px 100px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:textDim,marginBottom:10}}>SELECCIONAR AERONAVE PARA EDITAR</div>
        {allAc.map(ac=>{
          const edited=hasOvr(ac.id);
          return (
            <div key={ac.id} onClick={()=>setEditingAcId(ac.id)}
                 style={{background:cardBg,border:`1px solid ${edited?"#4CAF5055":border}`,borderRadius:8,padding:"13px 14px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:42,height:42,background:`${ac.color||accent}18`,border:`1px solid ${ac.color||accent}44`,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>✈</div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:"bold",color:text}}>{ac.name}</div>
                <div style={{fontSize:11,color:ac.color||accent,marginTop:2}}>{ac.registration}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                {edited&&<div style={{fontSize:9,color:"#4CAF50",letterSpacing:1}}>EDITADO</div>}
                {!ac.isBuiltIn&&<div style={{fontSize:9,color:textDim,letterSpacing:1}}>CUSTOM</div>}
              </div>
              <div style={{fontSize:20,color:border}}>›</div>
            </div>
          );
        })}
        <button onClick={()=>setAddingNew(true)}
                style={{width:"100%",marginTop:8,padding:"12px 0",background:`${accent}14`,border:`1.5px dashed ${accent}`,color:accent,fontSize:11,cursor:"pointer",borderRadius:6,letterSpacing:2}}>
          + AGREGAR AERONAVE
        </button>
      </div>
      <BottomNavBar onBack={onBack} onSettings={onSettings} settings={settings}/>
    </div>
  );
}
