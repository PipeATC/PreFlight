// ── SCRATCHPAD ──────────────────────────────────────────────────────────────
// Handwritten note pad. Draws with any pointer — Apple Pencil / stylus, finger
// touch, or mouse — via the Pointer Events API. Strokes are stored as vector
// points in a normalised 0..1 space so a note re-renders crisply at any size or
// pixel density, and persist in localStorage (fully offline, like the rest of
// the app). Themes follow the app's dark / white / mil-green palettes.

function scratchColors(settings){
  return {
    bg:      settings.milGreen?"#0d1208":settings.whiteMode?"#f0f4f8":"#0a0e14",
    cardBg:  settings.milGreen?"#141d0a":settings.whiteMode?"#fff":"#0d1624",
    border:  settings.milGreen?"#2a4018":settings.whiteMode?"#d0dde8":"#1e2a3a",
    text:    settings.milGreen?"#b8c9a0":settings.whiteMode?"#1a2535":"#c8d6e5",
    textDim: settings.milGreen?"#5a7040":settings.whiteMode?"#8899aa":"#3a5070",
    accent:  settings.milGreen?"#8fbc5a":"#4FC3F7",
    // Drawing surface: a "paper" colour + faint template lines + default ink.
    paper:   settings.milGreen?"#10180a":settings.whiteMode?"#ffffff":"#0e1826",
    grid:    settings.milGreen?"rgba(143,188,90,0.16)":settings.whiteMode?"rgba(120,140,165,0.22)":"rgba(120,150,190,0.15)",
    ink:     settings.milGreen?"#d6e4bf":settings.whiteMode?"#1a2535":"#e8eef5",
  };
}

const SCRATCH_FONT="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif";

// Aviation form field definitions (EN/ES) painted behind the ink layer.
// (CRAFT, ATIS, TAKEOFF, LANDING, HOLDING have dedicated ForeFlight-style
//  renderers; only PIREP uses this generic label+line list.)
const SCRATCH_FORMS = {
  pirep: {
    en:{title:"PIREP", rows:["/OV  LOCATION","/TM  TIME (Z)","/FL  ALTITUDE","/TP  AIRCRAFT","/SK  SKY","/WX  WEATHER","/TA  TEMP","/WV  WIND","/TB  TURBULENCE","/IC  ICING","/RM  REMARKS"]},
    es:{title:"PIREP", rows:["/OV  UBICACIÓN","/TM  HORA (Z)","/FL  ALTITUD","/TP  AERONAVE","/SK  CIELO","/WX  METEO","/TA  TEMP","/WV  VIENTO","/TB  TURBULENCIA","/IC  ENGELAMIENTO","/RM  OBSERV."]},
  },
};

// Draw a label with an optional (smaller, lowered) subscript. Returns advance width.
function drawScratchSub(ctx,x,y,main,sub,fs,color,alpha){
  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  ctx.fillStyle=color; ctx.globalAlpha=alpha==null?1:alpha;
  ctx.font=`600 ${fs}px ${SCRATCH_FONT}`;
  ctx.fillText(main,x,y);
  const mw=ctx.measureText(main).width;
  let total=mw;
  if(sub){
    const sfs=Math.round(fs*0.62);
    ctx.font=`600 ${sfs}px ${SCRATCH_FONT}`;
    ctx.fillText(sub,x+mw+1,y+fs*0.16);
    total=mw+1+ctx.measureText(sub).width;
  }
  ctx.globalAlpha=1;
  return total;
}

// A boxed grid of cells (each cell a {main,sub} label top-left). rowsSpec = array of rows.
function drawScratchSpeedGrid(ctx,x0,yTop,W,gridH,rowsSpec,colors){
  const x1=x0+W, nR=rowsSpec.length, rH=gridH/nR;
  ctx.strokeStyle=colors.grid; ctx.lineWidth=1.4; ctx.globalAlpha=0.9;
  ctx.strokeRect(x0,yTop,W,gridH);
  ctx.beginPath();
  for(let r=1;r<nR;r++){ ctx.moveTo(x0,yTop+rH*r); ctx.lineTo(x1,yTop+rH*r); }
  ctx.stroke();
  const fs=Math.max(12,Math.min(20,W/26));
  rowsSpec.forEach((cells,r)=>{
    const nC=cells.length, cW=W/nC;
    ctx.strokeStyle=colors.grid; ctx.lineWidth=1.4; ctx.beginPath();
    for(let cc=1;cc<nC;cc++){ ctx.moveTo(x0+cW*cc,yTop+rH*r); ctx.lineTo(x0+cW*cc,yTop+rH*(r+1)); }
    ctx.stroke();
    cells.forEach((cell,cc)=>{
      drawScratchSub(ctx,x0+cW*cc+fs*0.5,yTop+rH*r+fs*1.25,cell.main,cell.sub,fs,colors.text,0.85);
    });
  });
  ctx.globalAlpha=1;
}

// Shared bottom "clearance data" field block for TAKEOFF / LANDING.
function drawScratchDataBlock(ctx,x0,yTop,W,blockH,colors,lang,rightLbl){
  const es=lang==="es", x1=x0+W;
  const Lb= es
   ? {apt:"APT",elev:"ELEV",rwy:"PISTA",atis:"ATIS",wind:"VIENTO",vis:"VIS",cig:"TECHO",temp:"TEMP/PR",alt:"ALT",rmks:"OBS",len:"LONG PISTA",req:"PISTA REQ",zfw:"ZFW"}
   : {apt:"APT",elev:"ELEV",rwy:"RWY",atis:"ATIS",wind:"WIND",vis:"VIS",cig:"CIG",temp:"TEMP/DP",alt:"ALT",rmks:"RMKS",len:"RWY LENGTH",req:"RWY REQ'D",zfw:"ZFW"};
  const rows=6, rowH=blockH/rows;
  const fs=Math.max(11,Math.min(17,W/34));
  ctx.font=`600 ${fs}px ${SCRATCH_FONT}`; ctx.textBaseline="alphabetic"; ctx.textAlign="left";
  const yOf=i=>yTop+rowH*(i+0.68);
  const c3=[x0, x0+W/3, x0+W*2/3];
  const e3=[x0+W/3-12, x0+W*2/3-12, x1];
  const field=(label,x,xe,y)=>{
    ctx.font=`600 ${fs}px ${SCRATCH_FONT}`;
    ctx.fillStyle=colors.text; ctx.globalAlpha=0.85; ctx.fillText(label,x,y);
    const lw=ctx.measureText(label).width;
    ctx.globalAlpha=0.5; ctx.strokeStyle=colors.grid; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(x+lw+8,y+3); ctx.lineTo(xe,y+3); ctx.stroke(); ctx.globalAlpha=1;
  };
  field(Lb.apt,c3[0],e3[0],yOf(0)); field(Lb.elev,c3[1],e3[1],yOf(0)); field(Lb.rwy,c3[2],e3[2],yOf(0));
  field(Lb.atis,c3[0],e3[0],yOf(1)); field(Lb.wind,c3[1],e3[1],yOf(1)); field(Lb.vis,c3[2],e3[2],yOf(1));
  field(Lb.cig,c3[0],e3[0],yOf(2)); field(Lb.temp,c3[1],e3[1],yOf(2)); field(Lb.alt,c3[2],e3[2],yOf(2));
  field(Lb.rmks,x0,x1,yOf(3));
  field(Lb.len,x0,x0+W*0.5-12,yOf(4)); field(Lb.req,x0+W*0.5,x1,yOf(4));
  field(Lb.zfw,x0,x0+W*0.5-12,yOf(5)); field(rightLbl,x0+W*0.5,x1,yOf(5));
}

// CRAFT: big C R A F T letters down the left margin, open writing space.
function drawScratchCraft(ctx,w,h,colors){
  const letters=["C","R","A","F","T"];
  const m=Math.max(10,h*0.02), top=m, bot=h-m;
  const rowH=(bot-top)/letters.length;
  const fs=Math.min(rowH*0.5,w*0.09,74);
  ctx.save();
  ctx.fillStyle=colors.text; ctx.globalAlpha=0.9;
  ctx.font=`bold ${fs}px ${SCRATCH_FONT}`;
  ctx.textAlign="center"; ctx.textBaseline="middle";
  const cx=Math.max(fs*0.9,w*0.05);
  letters.forEach((L,i)=>ctx.fillText(L,cx,top+rowH*(i+0.5)));
  // faint separator baselines to guide handwriting
  ctx.globalAlpha=0.35; ctx.strokeStyle=colors.grid; ctx.lineWidth=1;
  ctx.beginPath();
  for(let i=1;i<letters.length;i++){ ctx.moveTo(cx+fs*0.8,top+rowH*i); ctx.lineTo(w-m,top+rowH*i); }
  ctx.stroke();
  ctx.globalAlpha=1; ctx.restore();
}

// HOLDING CLEARANCE: field lines up top, open space below for a hand-drawn pattern.
function drawScratchHolding(ctx,w,h,colors,lang){
  const es=lang==="es";
  const T= es
    ? {title:"AUTORIZACIÓN DE ESPERA",hold:"ESPERAR",of:"DE",rad:"RAD/RUMBO",turns:"VIRAJES:",right:"DER",left:"IZQ",alt:"ALTITUD",efc:"EFC (HORA)"}
    : {title:"HOLDING CLEARANCE",hold:"HOLD",of:"OF",rad:"RAD/CRS",turns:"TURNS:",right:"RIGHT",left:"LEFT",alt:"ALTITUDE",efc:"EXPECT FURTHER CLRNC"};
  const m=Math.max(14,w*0.04), x0=m, x1=w-m, W=x1-x0;
  ctx.save();
  const titleFs=Math.max(14,Math.min(24,w/32));
  ctx.fillStyle=colors.text; ctx.globalAlpha=0.9; ctx.textAlign="center"; ctx.textBaseline="alphabetic";
  ctx.font=`600 ${titleFs}px ${SCRATCH_FONT}`;
  ctx.fillText(T.title,w/2,m+titleFs); ctx.globalAlpha=1;

  const fs=Math.max(13,Math.min(21,w/38));
  ctx.font=`600 ${fs}px ${SCRATCH_FONT}`; ctx.textAlign="left";
  const fTop=m+titleFs*2.1, fBot=h*0.52, rowH=(fBot-fTop)/4;
  const yOf=i=>fTop+rowH*(i+0.55);
  const txt=(s,x,y)=>{ ctx.fillStyle=colors.text; ctx.globalAlpha=0.85; ctx.font=`600 ${fs}px ${SCRATCH_FONT}`; ctx.fillText(s,x,y); ctx.globalAlpha=1; return ctx.measureText(s).width; };
  const line=(xa,xb,y)=>{ ctx.globalAlpha=0.5; ctx.strokeStyle=colors.grid; ctx.lineWidth=1.4; ctx.beginPath(); ctx.moveTo(xa,y+3); ctx.lineTo(xb,y+3); ctx.stroke(); ctx.globalAlpha=1; };

  // Row 0: HOLD ___ OF ___
  let y=yOf(0);
  let lw=txt(T.hold,x0,y); const ofX=x0+W*0.5;
  line(x0+lw+10,ofX-W*0.06,y);
  lw=txt(T.of,ofX,y);
  line(ofX+lw+10,x1,y);
  // Row 1: RAD/CRS ___   TURNS: RIGHT / LEFT
  y=yOf(1);
  lw=txt(T.rad,x0,y);
  line(x0+lw+10,x0+W*0.44,y);
  let tx=x0+W*0.52; lw=txt(T.turns,tx,y); tx+=lw+14;
  lw=txt(T.right,tx,y); tx+=lw+10;
  lw=txt("/",tx,y); tx+=lw+10;
  txt(T.left,tx,y);
  // Row 2: ALTITUDE ___
  y=yOf(2);
  lw=txt(T.alt,x0,y); line(x0+lw+10,x1,y);
  // Row 3: EXPECT FURTHER CLRNC ___
  y=yOf(3);
  lw=txt(T.efc,x0,y); line(x0+lw+10,x1,y);
  ctx.restore();
}

// TAKEOFF DATA: speed grid, clearance area, data block, emergency-return section.
function drawScratchTakeoff(ctx,w,h,colors,lang){
  const es=lang==="es";
  const T= es? {title:"DATOS DE DESPEGUE",clr:"AUTORIZACIÓN",emer:"REGRESO EMERGENCIA",wgt:"PESO DESP",flaps:"FLAPS"}
             : {title:"TAKEOFF DATA",clr:"CLEARANCE",emer:"EMERGENCY RETURN",wgt:"T/O WGT",flaps:"FLAPS"};
  const m=Math.max(8,w*0.014), x0=m, x1=w-m, W=x1-x0;
  ctx.save(); ctx.textBaseline="alphabetic";
  const titleFs=Math.max(15,Math.min(26,w/34));
  ctx.fillStyle=colors.text; ctx.globalAlpha=0.9; ctx.textAlign="center"; ctx.font=`600 ${titleFs}px ${SCRATCH_FONT}`;
  ctx.fillText(T.title,w/2,m+titleFs); ctx.globalAlpha=1;
  let y=m+titleFs*1.5;
  const gridH=h*0.235;
  drawScratchSpeedGrid(ctx,x0,y,W,gridH,[
    [{main:"T/O N",sub:"1"},{main:"CLB N",sub:"1"}],
    [{main:"V",sub:"1"},{main:"V",sub:"R"},{main:"V",sub:"2"}],
    [{main:"V",sub:"FR"},{main:"V",sub:"ENR"},{main:T.flaps,sub:""}],
  ],colors);
  y+=gridH+m*1.4;
  const secFs=Math.max(13,Math.min(20,w/40));
  ctx.textAlign="left"; ctx.fillStyle=colors.text; ctx.globalAlpha=0.85; ctx.font=`600 ${secFs}px ${SCRATCH_FONT}`;
  ctx.fillText(T.clr,x0,y+secFs); ctx.globalAlpha=1;
  // Bottom-pinned sections.
  const emerH=h*0.115, blockH=h*0.235;
  const emerTop=h-m-emerH, blockTop=emerTop-m-blockH;
  drawScratchDataBlock(ctx,x0,blockTop,W,blockH,colors,lang,T.wgt);
  // Divider + emergency return.
  ctx.globalAlpha=0.7; ctx.strokeStyle=colors.grid; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(x0,emerTop-m*0.5); ctx.lineTo(x1,emerTop-m*0.5); ctx.stroke(); ctx.globalAlpha=1;
  ctx.textAlign="center"; ctx.fillStyle=colors.text; ctx.globalAlpha=0.9; ctx.font=`600 ${secFs}px ${SCRATCH_FONT}`;
  ctx.fillText(T.emer,w/2,emerTop+secFs); ctx.globalAlpha=1;
  const efs=Math.max(11,Math.min(17,w/40));
  const ey=emerTop+emerH*0.9;
  const c3=[x0, x0+W/3, x0+W*2/3], e3=[x0+W/3-12, x0+W*2/3-12, x1];
  const subField=(main,sub,x,xe,yy)=>{
    const lw=drawScratchSub(ctx,x,yy,main,sub,efs,colors.text,0.85);
    ctx.globalAlpha=0.5; ctx.strokeStyle=colors.grid; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(x+lw+8,yy+3); ctx.lineTo(xe,yy+3); ctx.stroke(); ctx.globalAlpha=1;
  };
  subField("V","REF",c3[0],e3[0],ey); subField("V","APP",c3[1],e3[1],ey); subField("MSA","",c3[2],e3[2],ey);
  ctx.restore();
}

// LANDING DATA: speed grid, clearance area, data block.
function drawScratchLanding(ctx,w,h,colors,lang){
  const es=lang==="es";
  const T= es? {title:"DATOS DE ATERRIZAJE",clr:"AUTORIZACIÓN",wgt:"PESO ATER",req:"PISTA REQ"}
             : {title:"LANDING DATA",clr:"CLEARANCE",wgt:"LDG WGT",req:"RWY REQ'D"};
  const m=Math.max(8,w*0.014), x0=m, x1=w-m, W=x1-x0;
  ctx.save(); ctx.textBaseline="alphabetic";
  const titleFs=Math.max(15,Math.min(26,w/34));
  ctx.fillStyle=colors.text; ctx.globalAlpha=0.9; ctx.textAlign="center"; ctx.font=`600 ${titleFs}px ${SCRATCH_FONT}`;
  ctx.fillText(T.title,w/2,m+titleFs); ctx.globalAlpha=1;
  let y=m+titleFs*1.5;
  const gridH=h*0.16;
  drawScratchSpeedGrid(ctx,x0,y,W,gridH,[
    [{main:"V",sub:"REF"},{main:"V",sub:"APP"}],
    [{main:"GA N",sub:"1"},{main:T.req,sub:""}],
  ],colors);
  y+=gridH+m*1.4;
  const secFs=Math.max(13,Math.min(20,w/40));
  ctx.textAlign="left"; ctx.fillStyle=colors.text; ctx.globalAlpha=0.85; ctx.font=`600 ${secFs}px ${SCRATCH_FONT}`;
  ctx.fillText(T.clr,x0,y+secFs); ctx.globalAlpha=1;
  const blockH=h*0.26, blockTop=h-m-blockH;
  drawScratchDataBlock(ctx,x0,blockTop,W,blockH,colors,lang,T.wgt);
  ctx.restore();
}

// ATIS: boxed-grid form (mirrors ForeFlight's ATIS ScratchPad layout).
function drawScratchAtis(ctx,w,h,colors,lang){
  const FONT="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif";
  const es=lang==="es";
  const Lbl = es
    ? {ap:"Aeropuerto / Info:",rwy:"Pistas:",wind:"Viento:",xw:"Viento cruzado:",gust:"Ráfaga:",rwy1:"Pista:",vis:"Visibilidad:",cloud:"Nubes:",temp:"Temp / Rocío:",qnh:"QNH:",rmk:"Observaciones:"}
    : {ap:"Airport / Info:",rwy:"Runways:",wind:"Wind:",xw:"Crosswind:",gust:"Gust:",rwy1:"Runway:",vis:"Visibility:",cloud:"Cloud:",temp:"Temp / Dew:",qnh:"QNH:",rmk:"Remarks:"};

  const m=Math.max(4,w*0.008);
  const x0=m,y0=m,x1=w-m,y1=h-m;
  const W=x1-x0,H=y1-y0;
  const midX=x0+W*0.5;
  const rw=[1,1.1,1,1,1.15]; const tot=rw.reduce((a,b)=>a+b,0);
  const yy=[y0]; rw.forEach(r=>yy.push(yy[yy.length-1]+H*r/tot));

  ctx.save();
  // Grid: outer frame + row dividers + column dividers (rows 0,2,3).
  ctx.strokeStyle=colors.grid; ctx.lineWidth=1.4;
  ctx.strokeRect(x0,y0,W,H);
  ctx.beginPath();
  for(let i=1;i<yy.length-1;i++){ ctx.moveTo(x0,yy[i]); ctx.lineTo(x1,yy[i]); }
  [[0,1],[2,3],[3,4]].forEach(([a,b])=>{ ctx.moveTo(midX,yy[a]); ctx.lineTo(midX,yy[b]); });
  ctx.stroke();

  // Cell labels (top-left of each cell).
  const fs=Math.max(11,Math.min(18,w/42));
  ctx.font=`600 ${fs}px ${FONT}`;
  ctx.textBaseline="alphabetic"; ctx.textAlign="left";
  ctx.fillStyle=colors.text; ctx.globalAlpha=0.78;
  const lab=(txt,x,y)=>ctx.fillText(txt,x+fs*0.9,y+fs*1.5);
  lab(Lbl.ap,x0,yy[0]);   lab(Lbl.rwy,midX,yy[0]);
  lab(Lbl.wind,x0,yy[1]);
  lab(Lbl.vis,x0,yy[2]);  lab(Lbl.cloud,midX,yy[2]);
  lab(Lbl.temp,x0,yy[3]); lab(Lbl.qnh,midX,yy[3]);
  lab(Lbl.rmk,x0,yy[4]);

  // Wind cell sub-fields on the right (Crosswind / Gust / Runway).
  const subFs=Math.max(10,fs*0.92);
  ctx.font=`600 ${subFs}px ${FONT}`;
  const wTop=yy[1], wH=yy[2]-yy[1], subX=x0+W*0.55;
  [[Lbl.xw,wTop+wH*0.30],[Lbl.gust,wTop+wH*0.56],[Lbl.rwy1,wTop+wH*0.82]].forEach(([txt,cy])=>{
    ctx.fillStyle=colors.text; ctx.globalAlpha=0.78;
    ctx.fillText(txt,subX,cy);
    const tw=ctx.measureText(txt).width;
    ctx.globalAlpha=0.5; ctx.strokeStyle=colors.grid; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(subX+tw+10,cy+2); ctx.lineTo(x1-fs,cy+2); ctx.stroke();
  });
  ctx.globalAlpha=1;
  ctx.restore();
}

// Paint the template background into a 2D context.
// `colors` = scratchColors() palette; `lang` = "en" | "es".
function drawScratchTemplate(ctx,w,h,template,colors,lang){
  const grid=colors.grid, labelCol=colors.textDim, accent=colors.accent;
  const FONT="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif";
  ctx.save();

  // Plain backgrounds ------------------------------------------------------
  if(template==="blank"||template==="draw"){ ctx.restore(); return; }
  if(template==="grid"){
    ctx.strokeStyle=grid; ctx.lineWidth=1; ctx.beginPath();
    const step=Math.max(18,w/18);
    for(let x=step;x<w;x+=step){ctx.moveTo(x,0);ctx.lineTo(x,h);}
    for(let y=step;y<h;y+=step){ctx.moveTo(0,y);ctx.lineTo(w,y);}
    ctx.stroke(); ctx.restore(); return;
  }
  if(template==="lines"||template==="type"){
    ctx.strokeStyle=grid; ctx.lineWidth=1; ctx.beginPath();
    const step=Math.max(26,h/16);
    for(let y=step;y<h;y+=step){ctx.moveTo(0,y);ctx.lineTo(w,y);}
    ctx.stroke(); ctx.restore(); return;
  }

  // Dedicated ForeFlight-style layouts.
  if(template==="atis"){    ctx.restore(); drawScratchAtis(ctx,w,h,colors,lang);    return; }
  if(template==="craft"){   ctx.restore(); drawScratchCraft(ctx,w,h,colors);       return; }
  if(template==="holding"){ ctx.restore(); drawScratchHolding(ctx,w,h,colors,lang); return; }
  if(template==="takeoff"){ ctx.restore(); drawScratchTakeoff(ctx,w,h,colors,lang); return; }
  if(template==="landing"){ ctx.restore(); drawScratchLanding(ctx,w,h,colors,lang); return; }

  // Aviation form templates ------------------------------------------------
  const form=SCRATCH_FORMS[template];
  if(!form){ ctx.restore(); return; }
  const L=form[lang==="es"?"es":"en"];
  const rows=L.rows;

  const pad=Math.max(14,w*0.05);
  const titleFs=Math.min(19,Math.max(12,w/28));
  ctx.textBaseline="alphabetic"; ctx.textAlign="left";
  ctx.fillStyle=accent; ctx.font=`bold ${titleFs}px ${FONT}`;
  ctx.fillText(L.title,pad,pad+titleFs);
  ctx.strokeStyle=accent; ctx.globalAlpha=0.4; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(pad,pad+titleFs+7); ctx.lineTo(w-pad,pad+titleFs+7); ctx.stroke();
  ctx.globalAlpha=1;

  const top=pad+titleFs+pad*0.9;
  const avail=h-top-pad;
  const rowH=avail/rows.length;
  const fs=Math.max(10,Math.min(15,rowH*0.4,w/26));
  ctx.font=`600 ${fs}px ${FONT}`;
  rows.forEach((r,i)=>{
    const y=top+rowH*i+rowH*0.62;
    ctx.fillStyle=labelCol; ctx.fillText(r,pad,y);
    const lw=ctx.measureText(r).width;
    ctx.strokeStyle=grid; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad+lw+12,y+3); ctx.lineTo(w-pad,y+3); ctx.stroke();
  });

  ctx.restore();
}

// Draw one stroke (normalised points) onto a context sized w×h.
function drawScratchStroke(ctx,s,w,h){
  const p=s.p; if(!p||!p.length) return;
  ctx.lineJoin="round"; ctx.lineCap="round"; ctx.lineWidth=s.w;
  if(s.e){ ctx.globalCompositeOperation="destination-out"; ctx.strokeStyle="rgba(0,0,0,1)"; ctx.fillStyle="rgba(0,0,0,1)"; }
  else   { ctx.globalCompositeOperation="source-over";     ctx.strokeStyle=s.c;             ctx.fillStyle=s.c; }
  if(p.length===1){
    ctx.beginPath(); ctx.arc(p[0][0]*w,p[0][1]*h,s.w/2,0,Math.PI*2); ctx.fill();
  }else{
    ctx.beginPath(); ctx.moveTo(p[0][0]*w,p[0][1]*h);
    for(let i=1;i<p.length;i++) ctx.lineTo(p[i][0]*w,p[i][1]*h);
    ctx.stroke();
  }
  ctx.globalCompositeOperation="source-over";
}

function fmtScratchDate(ts){
  try{ const d=new Date(ts); return d.toLocaleDateString()+" "+d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}); }
  catch{ return ""; }
}

// ── Full-screen drawing editor ───────────────────────────────────────────────
function ScratchpadEditor({pad,settings,onSave}){
  const c=scratchColors(settings);
  const t=uiT(settings);
  const COLORS=[c.ink,"#E53935","#1E88E5","#43A047","#FDD835","#FB8C00"];
  const WIDTHS=[2,4,8];

  const [title,setTitle]=useState(pad.title||"");
  // Colour / width / pen-only are remembered on the device across notes & relaunches.
  const [color,setColor]=useState(()=>{const p=loadScratchPrefs(); return p.color||COLORS[0];});
  const [width,setWidth]=useState(()=>{const p=loadScratchPrefs(); return WIDTHS.includes(p.width)?p.width:4;});
  const [erase,setErase]=useState(false);
  const [penOnly,setPenOnly]=useState(()=>!!loadScratchPrefs().penOnly);
  const [,force]=useState(0); const rerender=()=>force(v=>v+1);
  useEffect(()=>{ saveScratchPrefs({color,width,penOnly}); },[color,width,penOnly]);

  const wrapRef=useRef(null), bgRef=useRef(null), drawRef=useRef(null);
  const strokesRef=useRef((pad.strokes||[]).map(s=>({...s,p:s.p.slice()})));
  const redoRef=useRef([]);
  const curRef=useRef(null);
  const ptrRef=useRef(null);
  const dprRef=useRef(1);

  // live tool values for pointer handlers (avoid stale closures)
  const toolRef=useRef({color,width,erase,penOnly});
  toolRef.current={color,width,erase,penOnly};

  const ctxOf=(cv)=>{ const g=cv.getContext("2d"); g.setTransform(dprRef.current,0,0,dprRef.current,0,0); return g; };
  const size=()=>({w:wrapRef.current.clientWidth,h:wrapRef.current.clientHeight});

  const renderBg=()=>{
    const {w,h}=size(); const g=ctxOf(bgRef.current);
    g.clearRect(0,0,w,h); g.fillStyle=c.paper; g.fillRect(0,0,w,h);
    drawScratchTemplate(g,w,h,pad.template,c,uiLang(settings));
  };
  const renderStrokes=()=>{
    const {w,h}=size(); const g=ctxOf(drawRef.current);
    g.clearRect(0,0,w,h);
    strokesRef.current.forEach(s=>drawScratchStroke(g,s,w,h));
  };

  const setupCanvas=()=>{
    const wrap=wrapRef.current; if(!wrap) return;
    const w=wrap.clientWidth, h=wrap.clientHeight;
    const dpr=window.devicePixelRatio||1; dprRef.current=dpr;
    [bgRef.current,drawRef.current].forEach(cv=>{
      cv.width=Math.round(w*dpr); cv.height=Math.round(h*dpr);
      cv.style.width=w+"px"; cv.style.height=h+"px";
    });
    renderBg(); renderStrokes();
  };

  useEffect(()=>{
    setupCanvas();
    const onResize=()=>setupCanvas();
    window.addEventListener("resize",onResize);
    window.addEventListener("orientationchange",onResize);
    return ()=>{ window.removeEventListener("resize",onResize); window.removeEventListener("orientationchange",onResize); };
  // eslint-disable-next-line
  },[]);
  // Re-theme the surface if the palette changes while open.
  useEffect(()=>{ if(wrapRef.current){ renderBg(); renderStrokes(); } // eslint-disable-next-line
  },[settings.milGreen,settings.whiteMode]);

  const nrm=(e)=>{
    const r=drawRef.current.getBoundingClientRect();
    return [ (e.clientX-r.left)/r.width, (e.clientY-r.top)/r.height ];
  };

  const onDown=(e)=>{
    const tool=toolRef.current;
    if(tool.penOnly && e.pointerType==="touch") return;   // palm / finger rejection
    if(ptrRef.current!==null) return;                     // one pointer at a time
    ptrRef.current=e.pointerId;
    try{ drawRef.current.setPointerCapture(e.pointerId); }catch{}
    const s={ c:tool.color, w:tool.width, e:tool.erase, p:[nrm(e)] };
    curRef.current=s; redoRef.current=[];
    const {w,h}=size(); drawScratchStroke(ctxOf(drawRef.current),s,w,h);
    e.preventDefault();
  };
  const onMove=(e)=>{
    if(e.pointerId!==ptrRef.current) return;
    const s=curRef.current; if(!s) return;
    const {w,h}=size(); const g=ctxOf(drawRef.current);
    g.lineJoin="round"; g.lineCap="round"; g.lineWidth=s.w;
    if(s.e){ g.globalCompositeOperation="destination-out"; g.strokeStyle="rgba(0,0,0,1)"; }
    else   { g.globalCompositeOperation="source-over";     g.strokeStyle=s.c; }
    const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
    evs.forEach(ev=>{
      const n=nrm(ev); const last=s.p[s.p.length-1];
      g.beginPath(); g.moveTo(last[0]*w,last[1]*h); g.lineTo(n[0]*w,n[1]*h); g.stroke();
      s.p.push(n);
    });
    g.globalCompositeOperation="source-over";
    e.preventDefault();
  };
  const onUp=(e)=>{
    if(e.pointerId!==ptrRef.current) return;
    try{ drawRef.current.releasePointerCapture(e.pointerId); }catch{}
    ptrRef.current=null;
    if(curRef.current){ strokesRef.current.push(curRef.current); curRef.current=null; rerender(); }
  };

  const undo=()=>{ if(!strokesRef.current.length) return; redoRef.current.push(strokesRef.current.pop()); renderStrokes(); rerender(); };
  const redo=()=>{ if(!redoRef.current.length) return; strokesRef.current.push(redoRef.current.pop()); renderStrokes(); rerender(); };
  const clearAll=()=>{ if(!strokesRef.current.length) return; if(!confirm(t.scratchClearConfirm)) return; redoRef.current=[]; strokesRef.current=[]; renderStrokes(); rerender(); };

  const makeThumb=()=>{
    if(!strokesRef.current.length) return "";
    const {w,h}=size(); const tw=360, th=Math.max(1,Math.round(tw*h/w));
    const off=document.createElement("canvas"); off.width=tw; off.height=th;
    const g=off.getContext("2d");
    g.fillStyle=c.paper; g.fillRect(0,0,tw,th);
    drawScratchTemplate(g,tw,th,pad.template,c,uiLang(settings));
    strokesRef.current.forEach(s=>drawScratchStroke(g,s,tw,th));
    try{ return off.toDataURL("image/png"); }catch{ return ""; }
  };

  const commit=()=>{
    onSave({
      ...pad,
      title:title.trim(),
      strokes:strokesRef.current,
      thumb:makeThumb(),
      updatedAt:Date.now(),
    });
  };

  const btn=(active)=>({
    display:"flex",alignItems:"center",justifyContent:"center",gap:5,
    background:active?c.accent+"22":"transparent",border:`1px solid ${active?c.accent:c.border}`,
    color:active?c.accent:c.textDim,borderRadius:8,padding:"8px 10px",fontSize:11,fontWeight:"bold",
    letterSpacing:1,cursor:"pointer",transition:"all 0.15s",minWidth:40,
  });
  const barBg=settings.whiteMode?"rgba(240,244,248,0.96)":settings.milGreen?"rgba(13,18,8,0.96)":"rgba(10,14,20,0.96)";

  return (
    <div style={{position:"fixed",inset:0,zIndex:200,background:c.bg,display:"flex",flexDirection:"column"}}>
      {/* Top bar: back(save) · title · undo/redo/clear */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",
                   paddingTop:"calc(10px + env(safe-area-inset-top,0px))",
                   background:barBg,borderBottom:`1px solid ${c.border}`,
                   backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>
        <button onClick={commit} style={{...btn(false),padding:"8px 12px"}}>‹ {t.back.replace('‹ ','')}</button>
        <input value={title} onChange={e=>setTitle(e.target.value)} placeholder={t.scratchNoteTitle}
               style={{flex:1,minWidth:0,background:"transparent",border:"none",outline:"none",
                       color:c.text,fontSize:15,fontWeight:"bold",letterSpacing:1,textAlign:"center"}}/>
        <button onClick={undo} disabled={!strokesRef.current.length} title="Undo"
                style={{...btn(false),opacity:strokesRef.current.length?1:0.35}}>↶</button>
        <button onClick={redo} disabled={!redoRef.current.length} title="Redo"
                style={{...btn(false),opacity:redoRef.current.length?1:0.35}}>↷</button>
        <button onClick={clearAll} style={{...btn(false),color:strokesRef.current.length?"#E57373":c.textDim,
                borderColor:strokesRef.current.length?"#E5737355":c.border}}>🗑</button>
      </div>

      {/* Drawing surface */}
      <div ref={wrapRef} style={{flex:1,position:"relative",overflow:"hidden",touchAction:"none"}}>
        <canvas ref={bgRef} style={{position:"absolute",inset:0}}/>
        <canvas ref={drawRef}
                onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp}
                onPointerCancel={onUp} onPointerLeave={onUp}
                style={{position:"absolute",inset:0,touchAction:"none",cursor:"crosshair"}}/>
      </div>

      {/* Tool bar: colours · widths · pen-only · eraser */}
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",justifyContent:"center",
                   padding:"12px 12px",paddingBottom:"calc(12px + env(safe-area-inset-bottom,0px))",
                   background:barBg,borderTop:`1px solid ${c.border}`,
                   backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",gap:8}}>
          {COLORS.map(col=>{
            const sel=!erase&&color===col;
            return <button key={col} onClick={()=>{setColor(col);setErase(false);}}
              style={{width:30,height:30,borderRadius:"50%",background:col,cursor:"pointer",
                      border:sel?`2.5px solid ${c.accent}`:`2px solid ${c.border}`,
                      boxShadow:sel?`0 0 10px ${c.accent}88`:"none",transition:"all 0.15s"}}/>;
          })}
        </div>
        <div style={{width:1,height:26,background:c.border}}/>
        <div style={{display:"flex",gap:6}}>
          {WIDTHS.map(wd=>{
            const sel=width===wd;
            return <button key={wd} onClick={()=>setWidth(wd)}
              style={{width:34,height:30,display:"flex",alignItems:"center",justifyContent:"center",
                      background:sel?c.accent+"22":"transparent",border:`1px solid ${sel?c.accent:c.border}`,
                      borderRadius:8,cursor:"pointer",transition:"all 0.15s"}}>
              <div style={{width:wd+6,height:wd+6,borderRadius:"50%",background:sel?c.accent:c.textDim}}/>
            </button>;
          })}
        </div>
        <div style={{width:1,height:26,background:c.border}}/>
        <button onClick={()=>setErase(e=>!e)} style={btn(erase)}>◨ {t.scratchEraser}</button>
        <button onClick={()=>setPenOnly(p=>!p)} style={btn(penOnly)}>✎ {t.scratchPenOnly}</button>
      </div>
    </div>
  );
}

// ── Gallery of saved scratchpads ─────────────────────────────────────────────
function ScratchpadScreen({settings,onBack,onSettings}){
  const c=scratchColors(settings);
  const t=uiT(settings);
  const [pads,setPads]=useState(loadScratchpads);
  const [editing,setEditing]=useState(null);
  const [chooser,setChooser]=useState(false);
  const [editMode,setEditMode]=useState(false);

  const persist=(list)=>{ setPads(list); saveScratchpads(list); };
  const newPad=(template)=>{
    setChooser(false);
    setEditing({ id:"sp"+Date.now(), title:"", template, strokes:[], thumb:"",
                 createdAt:Date.now(), updatedAt:Date.now(), isNew:true });
  };
  const savePad=(p)=>{
    const {isNew,...rest}=p;
    // Discard a brand-new note that was never drawn on.
    if(isNew && (!rest.strokes || !rest.strokes.length)){ setEditing(null); return; }
    const exists=pads.some(x=>x.id===rest.id);
    persist(exists ? pads.map(x=>x.id===rest.id?rest:x) : [rest,...pads]);
    setEditing(null);
  };
  const deletePad=(id)=>{ if(!confirm(t.scratchDeleteConfirm)) return; persist(pads.filter(x=>x.id!==id)); };

  if(editing) return <ScratchpadEditor pad={editing} settings={settings} onSave={savePad}/>;

  const TEMPLATES=[
    {id:"draw",   label:t.tplDraw,   icon:"✎"},
    {id:"lines",  label:t.tplLines,  icon:"≡"},
    {id:"grid",   label:t.tplGrid,   icon:"▦"},
    {id:"craft",  label:t.tplCraft,  icon:"▣"},
    {id:"atis",   label:t.tplAtis,   icon:"☁"},
    {id:"pirep",  label:t.tplPirep,  icon:"✉"},
    {id:"takeoff",label:t.tplTakeoff,icon:"➚"},
    {id:"landing",label:t.tplLanding,icon:"➘"},
    {id:"holding",label:t.tplHolding,icon:"↻"},
  ];

  return (
    <div style={{minHeight:"100vh",background:c.bg,padding:"16px 16px 100px"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,minHeight:30,paddingLeft:44}}>
        <button onClick={()=>setEditMode(m=>!m)} disabled={!pads.length}
                style={{background:"transparent",border:"none",color:pads.length?(editMode?c.accent:c.textDim):"transparent",
                        fontSize:11,fontWeight:"bold",letterSpacing:2,cursor:pads.length?"pointer":"default",width:56,textAlign:"left"}}>
          {editMode?t.done2:t.edit}
        </button>
        <div style={{flex:1,textAlign:"center",fontSize:11,letterSpacing:6,color:c.accent}}>{t.scratchTitle}</div>
        <button onClick={()=>setChooser(true)}
                style={{width:36,height:36,borderRadius:9,background:c.accent+"18",border:`1px solid ${c.accent}`,
                        color:c.accent,fontSize:22,lineHeight:1,cursor:"pointer",flexShrink:0,
                        display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      </div>

      {/* Module hero icon (matches Weight & Balance) — always shown */}
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:42,marginBottom:8}}>✎</div>
      </div>

      {/* Empty state */}
      {!pads.length && (
        <div style={{textAlign:"center",marginTop:40,color:c.textDim}}>
          <div style={{fontSize:14,letterSpacing:1,marginBottom:6,color:c.text}}>{t.scratchEmpty}</div>
          <div style={{fontSize:12,letterSpacing:0.5}}>{t.scratchEmptyHint}</div>
        </div>
      )}

      {/* Gallery grid */}
      {!!pads.length && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:14}}>
          {pads.map(p=>(
            <div key={p.id} onClick={()=>!editMode&&setEditing({...p})}
                 style={{background:c.cardBg,border:`1px solid ${c.border}`,borderRadius:12,overflow:"hidden",
                         cursor:editMode?"default":"pointer",position:"relative",transition:"all 0.2s",
                         boxShadow:"0 1px 3px rgba(0,0,0,0.15)"}}>
              <div style={{aspectRatio:"4 / 3",background:c.paper,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {p.thumb
                  ? <img src={p.thumb} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  : <span style={{fontSize:30,opacity:0.35,color:c.textDim}}>✎</span>}
              </div>
              <div style={{padding:"9px 11px"}}>
                <div style={{fontSize:12,fontWeight:"bold",color:c.text,letterSpacing:0.5,whiteSpace:"nowrap",
                             overflow:"hidden",textOverflow:"ellipsis"}}>{p.title||t.scratchUntitled}</div>
                <div style={{fontSize:10,color:c.textDim,marginTop:3,letterSpacing:0.5,textTransform:"none"}}>{fmtScratchDate(p.updatedAt)}</div>
              </div>
              {editMode && (
                <button onClick={(e)=>{e.stopPropagation();deletePad(p.id);}}
                        style={{position:"absolute",top:6,right:6,width:26,height:26,borderRadius:"50%",
                                background:"#E53935",border:"2px solid #fff",color:"#fff",fontSize:14,fontWeight:"bold",
                                cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
                                boxShadow:"0 1px 4px rgba(0,0,0,0.4)"}}>×</button>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Template chooser (mirrors ForeFlight's "Choose A Template") */}
      {chooser && (
        <div onClick={()=>setChooser(false)}
             style={{position:"fixed",inset:0,zIndex:150,background:"rgba(0,0,0,0.55)",
                     display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={e=>e.stopPropagation()} className="slide-up"
               style={{background:c.cardBg,border:`1px solid ${c.border}`,borderRadius:16,padding:"22px 20px",
                       width:"100%",maxWidth:360,maxHeight:"88vh",overflowY:"auto",boxShadow:"0 12px 40px rgba(0,0,0,0.5)"}}>
            <div style={{textAlign:"center",fontSize:13,letterSpacing:3,color:c.accent,fontWeight:"bold",marginBottom:18}}>{t.scratchChooseTemplate}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
              {TEMPLATES.map(tp=>(
                <button key={tp.id} onClick={()=>newPad(tp.id)}
                        style={{background:c.bg,border:`1px solid ${c.border}`,borderRadius:12,padding:"18px 6px",
                                cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8,
                                transition:"all 0.15s"}}
                        onMouseEnter={e=>{e.currentTarget.style.borderColor=c.accent;e.currentTarget.style.boxShadow=`0 0 14px ${c.accent}33`;}}
                        onMouseLeave={e=>{e.currentTarget.style.borderColor=c.border;e.currentTarget.style.boxShadow="none";}}>
                  <span style={{fontSize:34,color:c.accent,lineHeight:1}}>{tp.icon}</span>
                  <span style={{fontSize:10,fontWeight:"bold",letterSpacing:1,color:c.text}}>{tp.label}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      <BottomNavBar onBack={onBack} onSettings={onSettings} settings={settings}/>
    </div>
  );
}

}

        <div style={{fontSize:9,letterSpacing:8,color:accent,marginBottom:4}}>AVIATION SUITE</div>
        <div style={{fontSize:28,fontWeight:"bold",letterSpacing:5,color:text}}>PREFLIGHT</div>
        <div style={{fontSize:10,color:textDim,marginTop:4,letterSpacing:3}}>CAPE FLIGHT TRAINING</div>
      </div>
      {ITEMS.map(item=>{
        const isHov=hov===item.id;
        return (
          <div key={item.id} onClick={item.action}
               onMouseEnter={()=>setHov(item.id)} onMouseLeave={()=>setHov(null)}
               style={{background:cardBg,border:`1.5px solid ${isHov?item.color:border}`,borderRadius:14,
                       padding:"22px 20px",marginBottom:14,cursor:"pointer",
                       boxShadow:isHov?`0 0 24px ${item.color}33`:"none",transition:"all 0.2s",
                       display:"flex",alignItems:"center",gap:18}}>
            <div style={{width:66,height:66,background:`${item.color}18`,border:`1px solid ${item.color}44`,
                         borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",
                         flexShrink:0,fontSize:30,boxShadow:isHov?`0 0 20px ${item.color}44`:"none",transition:"box-shadow 0.2s"}}>
              {item.icon}
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:17,fontWeight:"bold",letterSpacing:2,color:isHov?item.color:text,transition:"color 0.2s",marginBottom:4}}>{item.label}</div>
              <div style={{fontSize:12,color:textDim,letterSpacing:0.5}}>{item.desc}</div>
            </div>
            <div style={{fontSize:26,color:isHov?item.color:border,transition:"all 0.2s",transform:isHov?"translateX(3px)":"none"}}>›</div>
          </div>
        );
      })}
    </div>
  );
}

// ── SELECTION SCREEN ───────────────────────────────────────────────────────
function SelectionScreen({aircraftType,onSelect,onBack,onSettings,settings}){
  const t = uiT(settings);
  const [hovered,setHovered] = useState(null);
  // Merge built-in + custom aircraft for this type
  const _customAC = loadCustomAC();
  const builtInEntries = Object.entries(AIRCRAFT).filter(([_,ac])=>ac.aircraftType===aircraftType);
  const customEntries = _customAC.filter(ac=>ac.aircraftType===aircraftType).map(ac=>{
    const ovr = getAcOverride(ac.id);
    const baseTypeCl = {en:C152_EN,es:C152_ES}; // fallback; real data from override
    return [ac.id, {
      ...ac,
      checklists: ovr?.checklist
        ? {en:clArrToObj(ovr.checklist.en||[]),es:clArrToObj(ovr.checklist.es||[])}
        : baseTypeCl,
      speedTable: ovr?.speedTable || null,
      emergencies: ovr?.emergencies || null,
    }];
  });
  const typeAircraft = [...builtInEntries, ...customEntries];
  const meta = TYPE_META[aircraftType];

  const bg = settings.milGreen?"#0d1208":settings.whiteMode?"#f0f4f8":"#0a0e14";
  const cardBg = settings.milGreen?"#141d0a":settings.whiteMode?"#fff":"#0d1624";
  const border = settings.milGreen?"#2a4018":settings.whiteMode?"#d0dde8":"#1e2a3a";
  const text = settings.milGreen?"#b8c9a0":settings.whiteMode?"#1a2535":"#c8d6e5";
  const textDim = settings.milGreen?"#5a7040":settings.whiteMode?"#8899aa":"#3a5070";
  const accent = settings.milGreen?"#8fbc5a":meta.color;

  const navBarBg = settings.whiteMode ? "rgba(240, 244, 248, 0.95)" : settings.milGreen ? "rgba(13, 18, 8, 0.95)" : "rgba(10, 14, 20, 0.95)";

  return (
    <div style={{minHeight:"100vh",background:bg,padding:"16px 14px 100px"}}>
      {/* Type header */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingLeft:44}}>
        <div style={{width:36,height:36,background:`${meta.color}18`,border:`1px solid ${meta.color}44`,
                     borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:20}}>
          {meta.icon}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,letterSpacing:3,color:accent,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{meta.label.toUpperCase()}</div>
        </div>
      </div>

      {/* Aircraft list */}
      {typeAircraft.map(([id,ac])=>{
        const isHov = hovered===id;
        const cl = checklistFor(ac, settings);
        const phases = Object.keys(cl).length;
        const items = Object.values(cl).flat().length;
        return (
          <div key={id} onClick={()=>onSelect(id)}
               onMouseEnter={()=>setHovered(id)} onMouseLeave={()=>setHovered(null)}
               style={{background:cardBg,border:`1px solid ${isHov?ac.color:border}`,borderRadius:8,
                       padding:"14px 16px",marginBottom:10,cursor:"pointer",
                       boxShadow:isHov?`0 0 14px ${ac.color}33`:"none",transition:"all 0.2s",
                       display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:48,height:48,background:`${ac.color}18`,border:`1px solid ${ac.color}44`,borderRadius:8,
                         display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,
                         boxShadow:isHov?`0 0 14px ${ac.color}44`:"none",transition:"box-shadow 0.2s"}}>
              {ac.icon}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",marginBottom:4}}>
                <div style={{fontSize:16,fontWeight:"bold",letterSpacing:0.5,color:isHov?ac.color:text,transition:"color 0.2s"}}>{ac.name}</div>
                <div style={{fontSize:11,padding:"3px 7px",background:`${ac.color}22`,border:`1px solid ${ac.color}44`,borderRadius:4,color:ac.color,fontWeight:"bold",letterSpacing:1}}>{ac.registration}</div>
              </div>
              <div style={{fontSize:12,color:textDim,marginTop:2}}>{ac.description}</div>
              {ac.version&&<div style={{fontSize:11,color:textDim,opacity:.7,marginTop:1}}>{ac.version}</div>}
              <div style={{display:"flex",gap:10,marginTop:6}}>
                <div style={{fontSize:13,fontWeight:"bold",color:ac.color}}>{phases} {t.phases}</div>
                <div style={{fontSize:12,color:textDim}}>{items} {t.items}</div>
              </div>
            </div>
            <div style={{fontSize:20,color:isHov?ac.color:border,transition:"all 0.2s",transform:isHov?"translateX(3px)":"none"}}>›</div>
          </div>
        );
      })}

      {/* Barra de Navegación Inferior Estilo Nativo */}
      <div style={{
        position:"fixed", bottom:0, left:0, right:0,
        background: navBarBg, borderTop:`1px solid ${border}`,
        display:"flex", alignItems:"center", justifyContent:"space-around",
        padding:"10px 10px", paddingBottom:"calc(10px + env(safe-area-inset-bottom, 0px))",
        zIndex:100, backdropFilter:"blur(12px)", WebkitBackdropFilter:"blur(12px)"
      }}>
        <button onClick={onBack} style={{flex:1, background:"transparent", border:"none", color:textDim, display:"flex", flexDirection:"column", alignItems:"center", gap:5, cursor:"pointer"}}>
          <span style={{fontSize:22, lineHeight:1}}>‹</span>
          <span style={{fontSize:10, fontWeight:"bold", letterSpacing:1}}>{t.back.replace('‹ ','').toUpperCase()}</span>
        </button>

        <button onClick={onSettings} style={{flex:1, background:"transparent", border:"none", color:textDim, display:"flex", flexDirection:"column", alignItems:"center", gap:5, cursor:"pointer"}}>
          <span style={{fontSize:20, lineHeight:1, marginTop:2}}>⚙</span>
          <span style={{fontSize:10, fontWeight:"bold", letterSpacing:1}}>SETTINGS</span>
        </button>
      </div>

    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────
function App(){
  const [settings,setSettings] = useState(loadSettings);
  const [view,setView] = useState("main");
  const [showSettings,setShowSettings] = useState(false);
  const [selectedType,setSelectedType] = useState(null);
  const [selectedAc,setSelectedAc] = useState(null);

  const updateSettings = (patch)=>{
    setSettings(prev=>{
      const next = typeof patch==="function" ? patch(prev) : {...prev,...patch};
      if(next.lang) next.lang = normalizeLang(next.lang);
      try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(next)); }catch{}
      return next;
    });
  };

  useEffect(()=>{
    document.body.className = settings.milGreen?"mil-green":settings.whiteMode?"white-mode":"";
  },[settings.milGreen,settings.whiteMode]);

  useEffect(()=>{
    if(!("serviceWorker" in navigator)) return;
    navigator.serviceWorker.getRegistrations().then(regs=>{regs.forEach(reg=>reg.update());});
  },[]);

  const goChecklist = (id)=>{ setSelectedAc(id); setView("checklist"); };
  const selectType = (typeId)=>{ setSelectedType(typeId); setView("type"); };
  const openSettings = ()=>setShowSettings(true);

  const [showDrawer,setShowDrawer]=useState(false);
  const navigateModule = (id)=>{
    setShowDrawer(false);
    if(id==="options"){ openSettings(); return; }
    setView(id);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh"}}>
      {view!=="main" && (
        <ModuleDrawer open={showDrawer} setOpen={setShowDrawer}
          onNavigate={navigateModule} settings={settings} current={view}/>
      )}
      {view==="main" && (
        <MainMenuScreen
          settings={settings}
          onChecklist={()=>setView("checklist-home")}
          onWeightBalance={()=>setView("weight-balance")}
          onScratchpad={()=>setView("scratchpad")}
          onAdmin={()=>setView("admin")}
          onOptions={openSettings}
        />
      )}
      {view==="checklist-home" && (
        <ChecklistHomeScreen
          settings={settings}
          onSelect={selectType}
          onBack={()=>setView("main")}
          onSettings={openSettings}
        />
      )}
      {view==="type" && (
        <SelectionScreen
          aircraftType={selectedType}
          settings={settings}
          onSelect={goChecklist}
          onBack={()=>setView("checklist-home")}
          onSettings={openSettings}
        />
      )}
      {view==="checklist" && (
        <ChecklistScreen
          aircraftId={selectedAc}
          settings={settings}
          customLists={[]}
          onSettings={openSettings}
          onBack={()=>{
            const ac = AIRCRAFT[selectedAc];
            const sameType = ac?.aircraftType
              ? Object.values(AIRCRAFT).filter(a=>a.aircraftType===ac.aircraftType)
              : [];
            if(sameType.length===1) setView("checklist-home");
            else { setSelectedType(ac.aircraftType); setView("type"); }
          }}
        />
      )}
      {view==="weight-balance" && (
        <WeightBalanceScreen settings={settings} onBack={()=>setView("main")} onSettings={openSettings}/>
      )}
      {view==="scratchpad" && (
        <ScratchpadScreen settings={settings} onBack={()=>setView("main")} onSettings={openSettings}/>
      )}
      {view==="admin" && (
        <AdminScreen settings={settings} onBack={()=>setView("main")} onSettings={openSettings}/>
      )}
      {showSettings && (
        <SettingsPanel onClose={()=>setShowSettings(false)} settings={settings} setSettings={updateSettings}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js?v=8')
      .then(function(reg){
        reg.update();
        console.log('SW registered:', reg.scope);
      })
      .catch(function(err){ console.log('SW failed:', err); });
  });
}
</script>
</body>
</html>
